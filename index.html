<script>
const Q = [
  {topic:"Derecho Político", q:"Según Verdugo, ¿cómo se define el Derecho Político actual?", opts:["La disciplina que estudia exclusivamente las normas escritas de la Constitución","La disciplina que procura conocer el funcionamiento real de las instituciones jurídico-políticas y la aplicabilidad real de las normas constitucionales","La ciencia que analiza el poder del Estado desde una perspectiva histórica","El conjunto de normas que regulan la organización del Estado"], ans:1, why:"Verdugo define el Derecho Político como la disciplina que busca conocer el funcionamiento real de las instituciones jurídico-políticas y la aplicabilidad real de las normas constitucionales, no solo las normas escritas."},
  {topic:"Derecho Político", q:"¿Cuál es la diferencia entre el Derecho Político y el Derecho Constitucional?", opts:["No hay diferencia, son sinónimos","El Derecho Político es más restringido y se enfoca en las normas escritas; el Constitucional es más amplio","El Derecho Político es más amplio, estudia la realidad política detrás de los textos; el Constitucional se enfoca en las normas escritas de la Constitución","El Derecho Constitucional es más amplio porque incluye todas las ramas del derecho"], ans:2, why:"El Derecho Político es más amplio: estudia la realidad política detrás de los textos. El Derecho Constitucional se enfoca en las normas escritas de la Constitución."},
  {topic:"El Hombre como Ser Social", q:"¿Qué afirma Verdugo sobre la existencia humana?", opts:["El hombre puede existir en completa soledad si así lo decide","El hombre no existe, sino que coexiste; no vive, sino que convive","El hombre es por naturaleza antisocial y solo se asocia por necesidad","El hombre existe independientemente de sus relaciones sociales"], ans:1, why:"Verdugo señala que 'el hombre no existe, sino que coexiste; no vive, sino que convive', indicando que vivir humanamente es vivir con otros hombres."},
  {topic:"El Hombre como Ser Social", q:"Según los apuntes, ¿qué genera la tensión entre la naturaleza social y antisocial del hombre?", opts:["La guerra entre naciones","La creación de instituciones","El surgimiento del lenguaje","La aparición del Estado moderno"], ans:1, why:"La tensión entre el impulso social y la naturaleza antisocial del hombre es precisamente lo que impulsa la creación de instituciones."},
  {topic:"El Hombre como Ser Social", q:"Según Tocuolto Fernández, lo social es para el hombre:", opts:["Solo un límite a su libertad","Únicamente una barrera que lo restringe","Ayuda necesaria y, al mismo tiempo, límite y barrera","Una imposición artificial del Estado"], ans:2, why:"Fernández afirma que 'lo social es ayuda necesaria y, al mismo tiempo, límite y barrera', capturando la doble dimensión de la convivencia humana."},
  {topic:"Concepciones de la Sociedad", q:"¿Cuál es la concepción mecánica o atomista de la sociedad?", opts:["La sociedad es una unidad originaria donde los individuos son miembros","La sociedad es solo una suma de individuos que permanecen distintos entre sí","La sociedad tiene vida propia, independiente de los individuos","La sociedad posee conciencia colectiva y voluntad independiente"], ans:1, why:"La concepción mecánica o atomista sostiene que la sociedad es apenas una suma de individuos, un aglomerado de partes que permanecen distintas entre sí, sin unidad propia."},
  {topic:"Concepciones de la Sociedad", q:"¿Con qué valores se asocia la concepción mecánica de la sociedad?", opts:["Comunitarismo y colectivismo","Totalitarismo y organicismo","Individualismo, libertad y democracia liberal","Nacionalismo y tradición"], ans:2, why:"La concepción mecánica tiene antecedentes en Hobbes, Locke y Rousseau, y se asocia al individualismo, la libertad y la democracia liberal."},
  {topic:"Concepciones de la Sociedad", q:"En la concepción orgánica u organicista, ¿qué es la sociedad?", opts:["Solo la suma de los individuos que la componen","Una unidad originaria con vida independiente de los individuos, que nace, se desarrolla y muere de modo propio","Una creación artificial del Estado","Un contrato entre individuos racionales"], ans:1, why:"La concepción orgánica entiende la sociedad como una unidad originaria con vida propia, independiente de los individuos, que nace, se desarrolla y muere de forma autónoma."},
  {topic:"Concepciones de la Sociedad", q:"¿Con qué tendencias políticas se asocia la concepción orgánica de la sociedad?", opts:["Democracia liberal","Anarquismo","Tendencias totalitarias","Socialismo democrático"], ans:2, why:"La concepción orgánica, que subordina al individuo a la unidad social, tiende a conjugarse con tendencias totalitarias."},
  {topic:"Concepciones de la Sociedad", q:"¿Qué posición adopta Verdugo en la controversia entre concepción mecánica y orgánica?", opts:["Se adhiere plenamente a la concepción orgánica","Adopta una posición ecléctica intermedia: toma de lo biológico que la sociedad es exigencia de la naturaleza del hombre, y de lo mecanicista que en la sociedad no se anula el libre albedrío","Rechaza ambas concepciones por considerarlas obsoletas","Se adhiere plenamente a la concepción mecánica"], ans:1, why:"Verdugo adopta una posición ecléctica: acepta de la visión biológica que la sociedad es una exigencia de la naturaleza humana, pero incorpora de la mecanicista que el libre albedrío individual no se anula en sociedad."},
  {topic:"Diferencias Humanas y Animales", q:"Según Aristóteles, ¿cuál es la diferencia clave entre las sociedades humanas y animales?", opts:["Los humanos son más inteligentes que los animales","Ningún otro animal es capaz de comunicar nociones a sus semejantes; el hombre usa el lenguaje para comunicar lo justo, lo injusto, lo bueno y lo malo","Los humanos forman grupos más grandes que los animales","Los humanos tienen tecnología y los animales no"], ans:1, why:"Aristóteles identifica como diferencia clave que ningún otro animal puede comunicar nociones a sus semejantes. El hombre usa el lenguaje para transmitir conceptos éticos como lo justo e injusto, lo bueno y lo malo."},
  {topic:"Las Instituciones", q:"Etimológicamente, ¿de qué palabra latina proviene 'institución'?", opts:["Institutio, que significa fundamento, cimiento, establecimiento primordial de alguna cosa","Institutum, que significa norma jurídica obligatoria","Institutrix, que significa persona que crea la ley","Institutio, que significa únicamente norma escrita"], ans:0, why:"La palabra 'institución' proviene del latín institutio, que significa fundamento, cimiento, establecimiento primordial de alguna cosa."},
  {topic:"Las Instituciones", q:"¿Por qué las instituciones son creaciones colectivas y no individuales?", opts:["Porque siempre las crea el Estado","Porque está fuera de las posibilidades individuales la creación de una institución; requieren del obrar humano colectivo","Porque solo los grupos religiosos pueden crearlas","Porque la ley prohíbe las instituciones individuales"], ans:1, why:"Las instituciones son creaciones colectivas porque está fuera de las posibilidades de un solo individuo crearlas; requieren del obrar humano colectivo con permanencia y orientación ética."},
  {topic:"Las Instituciones", q:"¿Qué dice Verdugo sobre la definición de instituciones?", opts:["Son normas jurídicas escritas por el legislador","Son creaciones del obrar humano colectivo que, con carácter de permanencia, procuran satisfacer necesidades sociales éticas","Son organismos del Estado que ejecutan las leyes","Son acuerdos temporales entre individuos para resolver conflictos"], ans:1, why:"Verdugo define las instituciones como 'creaciones del obrar humano colectivo que, con carácter de permanencia, procuran satisfacer necesidades sociales éticas'."},
  {topic:"Las Instituciones", q:"¿Cuál es el elemento estructural (o formal) de las instituciones?", opts:["Las ideas, creencias y sistemas de valores que las sostienen","La representación colectiva que les da legitimidad","La organización técnica y material: textos jurídicos, locales, muebles, maquinaria, emblemas, personal y jerarquía administrativa","El carisma del líder que las encabeza"], ans:2, why:"El elemento estructural o formal es representado por la organización técnica y material: textos jurídicos, locales, muebles, máquinas, emblemas, papel timbrado, personal y jerarquía administrativa."},
  {topic:"Las Instituciones", q:"¿Qué dijo Maurice Hauriou sobre el alma de la institución?", opts:["El alma de la institución es la fuerza de quienes la integran","El alma de la institución es la idea, la idea de la tarea a realizar; la institución es una idea de obra o de empresa que se realiza y dura jurídicamente en un medio social","El alma de la institución son sus normas escritas","El alma de la institución es el poder del Estado que la respalda"], ans:1, why:"Maurice Hauriou afirma que el alma de la institución es la idea de la tarea a realizar, y la define como una idea de obra o empresa que se realiza y dura jurídicamente en un medio social."},
  {topic:"Tipos de Instituciones", q:"¿Qué son las instituciones jurídicas?", opts:["Aquellas creadas exclusivamente por el poder legislativo","Aquellas que existen en el mundo del Derecho, creadas por normas y comportamientos adecuados, que tienden a realizar un principio de justicia","Las que administran justicia en los tribunales","Las que regulan exclusivamente las relaciones entre el Estado y los ciudadanos"], ans:1, why:"Las instituciones jurídicas existen en el mundo del Derecho, son creadas por normas y los comportamientos adecuados a ellas, y apuntan a la realización de un valor: la justicia."},
  {topic:"Tipos de Instituciones", q:"Según Lowestein, ¿qué son las instituciones políticas?", opts:["Solo los partidos políticos y el Parlamento","El aparato a través del cual se ejerce el poder en una sociedad organizada como Estado, siendo todos los elementos componentes de la maquinaria estatal","Los organismos internacionales que regulan las relaciones entre Estados","Solo las instituciones creadas por la Constitución"], ans:1, why:"Lowestein define las instituciones políticas como el aparato a través del cual se ejerce el poder en una sociedad organizada como Estado, siendo todos los elementos de la maquinaria estatal."},
  {topic:"Tipos de Instituciones", q:"¿Cuál es la diferencia entre institución y contrato según George Renard?", opts:["No hay diferencia real entre ambos conceptos","El contrato postula igualdad entre partes y sirve a propósitos subjetivos individuales; la institución implica diferenciación, jerarquía y subordinación del propósito individual a aspiraciones colectivas","El contrato es siempre escrito; la institución puede ser informal","El contrato es público; la institución siempre es privada"], ans:1, why:"Renard distingue que el contrato postula igualdad entre partes y sirve a propósitos individuales subjetivos, mientras que el principio de la institución implica la idea de Autoridad, diferenciación, jerarquía y subordinación del propósito individual a las aspiraciones colectivas."},
  {topic:"Instituciones y Cambio Social", q:"¿Qué afirma Hauriou sobre las instituciones y el cambio?", opts:["Las instituciones deben permanecer inalterables siempre","Las instituciones responden a necesidades; cuando cesan de rendirlas o se han corrompido, la confianza del público se aparta de ellas y se encuentran en trance de reforma o supresión","Las instituciones solo cambian mediante revolución violenta","Las instituciones son eternas e inmodificables por naturaleza"], ans:1, why:"Hauriou señala que las instituciones responden a necesidades; cuando dejan de servirlas o se corrompen, la confianza pública se aparta de ellas y quedan en proceso de reforma o supresión."},
  {topic:"Dignidad Humana", q:"¿Cuál es la relación triangular que constituye el núcleo del constitucionalismo contemporáneo?", opts:["Estado, Mercado y Sociedad Civil","Dignidad Humana, Derechos Humanos y Democracia","Constitución, Ley y Reglamento","Ejecutivo, Legislativo y Judicial"], ans:1, why:"La relación triangular entre Dignidad Humana, Derechos Humanos y Democracia es el núcleo del constitucionalismo contemporáneo: la dignidad es el fundamento, los DD.HH. son su expresión jurídica y la democracia es el ámbito en que se desarrollan."},
  {topic:"Dignidad Humana", q:"Según Ferrajoli, ¿qué papel cumplen los Derechos Humanos en la democracia sustancial?", opts:["Son el límite al contenido de las decisiones mayoritarias; hay cosas que la mayoría no puede decidir y cosas que está obligada a garantizar","Son meras declaraciones simbólicas sin efecto jurídico real","Son derechos que solo puede otorgar la mayoría parlamentaria","Son garantías exclusivamente económicas"], ans:0, why:"Ferrajoli sostiene que los DD.HH. constituyen la dimensión sustancial de la democracia, siendo el límite al contenido de las decisiones mayoritarias. Hay cosas que la mayoría no puede decidir y cosas que está obligada a garantizar."},
  {topic:"Dignidad Humana", q:"¿Qué establece el Artículo 1° inciso 1° de la Constitución Política de Chile sobre la dignidad?", opts:["La dignidad es un derecho que el Estado puede limitar por ley","Las personas nacen libres e iguales en dignidad y derechos","La dignidad es un concepto filosófico sin valor jurídico","La dignidad solo pertenece a los ciudadanos chilenos"], ans:1, why:"El Art. 1° inciso 1° de la CPR de Chile establece que 'las personas nacen libres e iguales en dignidad y derechos'. La dignidad humana es el primer valor consagrado, confirmando su rol de fundamento."},
  {topic:"Dignidad Humana", q:"Etimológicamente, ¿de qué depende la concepción de dignidad?", opts:["De la ley positiva vigente en cada país","De lo que el gobierno de turno establezca","De la concepción que se tenga de la naturaleza humana, pues dignidad significa ser tratado como lo que se es","De los tratados internacionales exclusivamente"], ans:2, why:"Etimológicamente, la dignidad significa 'ser tratado como lo que se es'. Por eso, la concepción de dignidad siempre dependerá de la concepción que se tenga de la naturaleza humana."},
  {topic:"Dignidad Humana", q:"¿Cuál es la concepción posicional de la dignidad, propia de la Antigüedad?", opts:["Todos los seres humanos tienen igual dignidad por naturaleza","La dignidad se basa en la posición social, filiación o cargo, siendo distintas y desiguales; justificó la esclavitud","La dignidad se funda en la creación divina del ser humano","La dignidad se basa en la autonomía individual y la razón"], ans:1, why:"La concepción posicional, propia de la Antigüedad griega, Roma y la Edad Media, basa la dignidad en la posición social, filiación o cargo. Las dignidades son distintas y desiguales, lo que justificó la esclavitud."},
  {topic:"Dignidad Humana", q:"¿En qué se basa la dignidad como fundamento religioso (cristiano)?", opts:["En los méritos y virtudes de cada individuo","En la creación por Dios, la filiación divina y la redención universal; une la dignidad al principio de igualdad y al libre albedrío","En la posición social heredada","En la capacidad de razonar del ser humano"], ans:1, why:"La dignidad como fundamento religioso se funda en la creación por Dios, lo que otorga a todos los seres humanos filiación divina y redención universal. Une la dignidad con el principio de igualdad y el libre albedrío."},
  {topic:"Dignidad Humana", q:"¿Cuál es el imperativo categórico de Kant relacionado con la dignidad?", opts:["Actúa solo según aquella máxima que puedas querer que sea ley universal","Trata a la humanidad siempre como fin, nunca solo como medio","Obra de modo que tus actos beneficien a la mayoría","El ser humano debe someterse siempre al Estado"], ans:1, why:"El imperativo categórico de Kant establece que se debe 'tratar a la humanidad siempre como fin, nunca solo como medio'. El ser humano no es solo medio, sino fin en sí mismo; esto es fundamento del Derecho moderno de los DD.HH."},
  {topic:"Dignidad Humana", q:"¿Cuál es el peligro de no definir claramente la dignidad humana?", opts:["Que los países no puedan firmar tratados internacionales","Que se convierte en un concepto manipulable, vacío de contenido, que puede usarse para argumentar posiciones contradictorias como la eutanasia tanto a favor como en contra","Que los jueces no puedan dictar sentencias","Que no sea posible crear leyes"], ans:1, why:"Sin un contenido claro y preciso, la dignidad se convierte en un concepto manipulable: el mismo concepto sirve para argumentar posiciones opuestas (ej: eutanasia, aborto, tanto a favor como en contra)."},
  {topic:"Dignidad y Bioética", q:"¿Qué tipo de bioética se propone en los apuntes?", opts:["Una bioética dogmática basada en una sola tradición filosófica","Una bioética laica: incluyente, abierta y tolerante, que permita el diálogo racional entre distintas perspectivas éticas y filosóficas","Una bioética exclusivamente religiosa","Una bioética determinada por el Estado"], ans:1, why:"Se propone una bioética laica: incluyente, abierta y tolerante, que permita el diálogo racional entre distintas perspectivas éticas y filosóficas, ajena a todo dogmatismo."},
  {topic:"Ética Nicomáquea - Justicia", q:"¿Cuáles son los dos sentidos principales del término 'injusto' identificados por Aristóteles?", opts:["El que engaña y el que roba","El que se aparta de la ley (paránomo) y el que toma para sí más de lo debido, siendo inequitativo (pleonexia/anisos)","El que no respeta a los ancianos y el que no paga impuestos","El que comete crímenes y el que falta a la moral"], ans:1, why:"Aristóteles identifica dos sentidos de 'injusto': (a) el que se aparta de la ley (paránomo) y (b) el que toma para sí más de lo debido (pleonexia) y es inequitativo (anisos)."},
  {topic:"Ética Nicomáquea - Justicia", q:"¿Qué es la Justicia General o Legal para Aristóteles?", opts:["La totalidad de la virtud ejercida en relación con la comunidad política; la única virtud cuyo bien es ajeno, pues realiza lo que conviene al otro","La distribución equitativa de bienes económicos","La sanción penal por delitos cometidos","El respeto a los contratos entre particulares"], ans:0, why:"La Justicia General es la totalidad de la virtud ejercida en relación con la comunidad política. Es la única virtud cuyo bien es ajeno: realiza lo que conviene al otro."},
  {topic:"Ética Nicomáquea - Justicia", q:"¿Qué es la Justicia Distributiva y qué principio la rige?", opts:["Rige las transacciones entre particulares bajo proporcionalidad aritmética","Regula el reparto de honores, dinero y bienes divisibles entre miembros de una comunidad política, rigiendo el principio de proporcionalidad geométrica: a cada uno según su mérito","Es la justicia aplicada en los tribunales penales","Rige los contratos voluntarios entre privados"], ans:1, why:"La Justicia Distributiva regula el reparto de honores, dinero y demás bienes divisibles entre los miembros de una comunidad política. Rige el principio de proporcionalidad geométrica: a cada uno según su mérito. Guía el Derecho público y tributario."},
  {topic:"Ética Nicomáquea - Justicia", q:"¿Cuál es la diferencia entre proporcionalidad geométrica y aritmética en la justicia?", opts:["No hay diferencia real entre ambas","La geométrica es propia de la justicia distributiva (según mérito); la aritmética es propia de la correctiva (el juez iguala sin importar el mérito de las partes)","La geométrica se aplica en penal; la aritmética en civil","La geométrica es más justa que la aritmética"], ans:1, why:"La proporcionalidad geométrica (A/B = C/D) es propia de la justicia distributiva: los méritos se corresponden con las partes recibidas. La aritmética es propia de la correctiva: el juez iguala quitando del exceso y añadiendo al defecto, sin importar el mérito."},
  {topic:"Ética Nicomáquea - Justicia", q:"¿Qué es la equidad (epieikeia) según Aristóteles?", opts:["La aplicación estricta de la ley sin excepciones","La corrección de lo justo legal allí donde la ley, por su generalidad, yerra u omite casos particulares; una cierta forma de justicia","La desobediencia civil justificada","El principio de igualdad formal ante la ley"], ans:1, why:"Aristóteles presenta la equidad como la corrección de lo justo legal allí donde la ley, por su generalidad, yerra u omite casos particulares. El hombre equitativo no se aferra rígidamente a la letra de la ley cuando hacerlo resultaría injusto."},
  {topic:"Ética Nicomáquea - Justicia", q:"¿Por qué es más grave cometer injusticia que padecerla, según Aristóteles?", opts:["Porque el que la comete sufre un daño mayor","Porque cometer injusticia implica maldad y es censurable; en cambio, padecer injusticia no implica maldad en quien la sufre","Porque el que la comete pierde sus derechos civiles","Porque la ley castiga más severamente al agresor"], ans:1, why:"Aristóteles indica que ambas son males, pero es peor cometer injusticia porque implica maldad y es censurable; mientras que padecer injusticia no implica maldad en quien la sufre."},
  {topic:"Teoría de la Justicia", q:"¿Cómo define Ulpiano la justicia?", opts:["La justicia es dar a cada uno lo que la ley dispone","La justicia es la constante y perpetua voluntad de dar a cada uno su derecho (ius suum cuique tribuere)","La justicia es el acuerdo entre las partes de un contrato","La justicia es la suma de las virtudes morales del gobernante"], ans:1, why:"Ulpiano, jurista romano, define la justicia como 'la constante y perpetua voluntad de dar a cada uno su derecho'. La expresión constante y perpetua voluntad remite a la idea de virtud moral."},
  {topic:"Teoría de la Justicia", q:"¿Cuáles son las 5 características generales de la justicia según los apuntes?", opts:["Legalidad, igualdad, proporcionalidad, universalidad y coercibilidad","Virtud en la voluntad, alteridad, objeto (el ius), exigibilidad y justo medio objetivo","Equidad, reciprocidad, solidaridad, libertad y paz","Imparcialidad, independencia, publicidad, celeridad y gratuidad"], ans:1, why:"Las 5 características de la justicia son: (1) virtud en la voluntad, (2) alteridad (siempre hay un otro), (3) objeto: el ius (conducta objetivamente debida), (4) exigibilidad (facultad moral legítima), y (5) justo medio objetivo (ni más ni menos de lo debido)."},
  {topic:"Teoría de la Justicia", q:"¿Cuál es el vicio opuesto a la justicia distributiva?", opts:["El robo y el hurto","La acepción de personas (discriminación arbitraria)","La lesión enorme","El enriquecimiento sin causa"], ans:1, why:"El vicio opuesto a la justicia distributiva es la acepción de personas: favorecer o perjudicar a alguien no por sus méritos, necesidades o dignidades, sino por parentesco, amistad u otras razones arbitrarias (Art. 19 N°2 CPR)."},
  {topic:"Teoría Política y el Poder", q:"¿Cuáles son las dos fases de la política identificadas en los apuntes?", opts:["Fase legislativa y fase ejecutiva","Fase agonal (dimensión competitiva para alcanzar y retener el poder) y fase arquitectónica (dimensión constructiva para organizar la sociedad y realizar el proyecto político)","Fase democrática y fase autoritaria","Fase nacional e internacional"], ans:1, why:"Las dos fases de la política son: (1) Fase Agonal, dimensión competitiva para alcanzar y retener el poder; y (2) Fase Arquitectónica, dimensión constructiva que consiste en organizar la sociedad y realizar el proyecto político como gobierno y administración."},
  {topic:"Teoría Política y el Poder", q:"¿Cuántas y cuáles son las disciplinas del conocimiento político mencionadas?", opts:["2: Ciencia Política y Filosofía Política","3 más 1 añadida: Teoría Política (descriptiva-explicativa), Doctrina Política (normativa), Filosofía Política (fundamentos últimos) y Ciencia Política (investigación empírica)","Solo 1: la Ciencia Política","4: Derecho, Economía, Sociología y Psicología"], ans:1, why:"Se mencionan 3 disciplinas más 1 añadida: (1) Teoría Política (descriptiva-explicativa), (2) Doctrina Política (normativa, el deber ser), (3) Filosofía Política (fundamentos últimos) y (4) Ciencia Política (estudio empírico mediante métodos de investigación)."},
  {topic:"El Poder", q:"¿Cómo define Max Weber el poder?", opts:["El poder es la capacidad de crear normas jurídicas vinculantes","El poder significa probabilidad de imponer la propia voluntad dentro de una relación social, aun contra toda resistencia y cualquiera que sea el fundamento de esa probabilidad","El poder es el monopolio legítimo de la fuerza física por parte del Estado","El poder es la autoridad reconocida voluntariamente por los ciudadanos"], ans:1, why:"Max Weber define el poder como la probabilidad de imponer la propia voluntad, dentro de una relación social, aun contra toda resistencia y cualquiera que sea el fundamento de esa probabilidad."},
  {topic:"El Poder", q:"¿Cuál es la diferencia entre poder e influencia?", opts:["No hay diferencia; son sinónimos","La influencia es una forma de poder oculto o indirecto que opera a través de la modificación de preferencias, creencias o conductas ajenas, careciendo de la formalización institucional propia del poder político","El poder es siempre legítimo; la influencia siempre es ilegítima","La influencia solo existe en democracia; el poder existe en todos los sistemas"], ans:1, why:"La influencia es una forma de poder oculto o indirecto: opera a través de la modificación de las preferencias, creencias y conductas ajenas, pero carece de la formalización institucional propia del poder político."},
  {topic:"El Poder", q:"¿Qué diferencia hay entre poder y autoridad?", opts:["La autoridad siempre usa la fuerza; el poder no","La autoridad es un saber socialmente reconocido; quien la tiene ve su mandato obedecido en virtud del reconocimiento de su competencia o legitimidad, operando por reconocimiento voluntario, no por coacción","El poder es legítimo; la autoridad siempre es ilegítima","No hay diferencia práctica entre poder y autoridad"], ans:1, why:"La autoridad es un saber socialmente reconocido. Quien tiene autoridad ve obedecido su mandato en virtud del reconocimiento voluntario de su competencia o legitimidad. Es una forma de poder que opera por reconocimiento voluntario, no por imposición."},
  {topic:"Legitimidad del Poder", q:"¿Cuál es la diferencia entre legalidad y legitimidad del poder?", opts:["Son sinónimos en el contexto del Derecho Político","La legalidad refiere a la conformidad del poder con las normas jurídicas vigentes; la legitimidad es más amplia: refiere a la justificación del poder ante quienes lo obedecen y está sujeta al Derecho justo","La legitimidad es solo formal; la legalidad es sustancial","La legalidad corresponde al poder; la legitimidad corresponde solo al Estado"], ans:1, why:"La legalidad refiere a la conformidad del poder con las normas jurídicas vigentes. La legitimidad, en cambio, es la justificación del poder ante quienes lo obedecen; está sujeta al Derecho justo que expresa valores básicos: vida, libertad, propiedad e igualdad."},
  {topic:"Legitimidad del Poder", q:"¿Cuáles son las tres fuentes de legitimidad del poder?", opts:["El carisma del líder, la tradición y la ley","Los Derechos Fundamentales y DD.HH., la Constitución y las leyes, y el Derecho Natural","La voluntad popular, el mercado y la fuerza militar","Solo la Constitución y las leyes"], ans:1, why:"Las 3 fuentes de legitimidad son: (1) Derechos Fundamentales y DD.HH. (expresión positiva de los valores básicos), (2) la Constitución y las leyes (marco normativo-positivo), y (3) el Derecho Natural (fundamento último de validez moral del ordenamiento jurídico)."},
  {topic:"Legitimidad del Poder", q:"¿Qué es la legitimidad de origen y cuándo se da?", opts:["La forma en que el poder es ejercido una vez obtenido","La forma en que el poder fue adquirido o conquistado; un poder es legítimo en su origen cuando se obtuvo mediante procedimientos reconocidos como válidos por la comunidad","El reconocimiento internacional de un gobierno","La aprobación popular medida en encuestas"], ans:1, why:"La legitimidad de origen (fase agonal) refiere a la forma en que el poder fue adquirido. Un poder es legítimo en su origen cuando se obtuvo mediante procedimientos reconocidos como válidos por la comunidad. Responde a: ¿cómo se llegó al poder?"},
  {topic:"Legitimidad del Poder", q:"¿Por qué un gobierno puede tener legitimidad de origen pero no de ejercicio?", opts:["Esto es imposible; la legitimidad es indivisible","Porque puede acceder al poder democráticamente pero derivar hacia la arbitrariedad, violando los valores y principios que justifican su existencia; ambas dimensiones son necesarias para que el poder sea plenamente legítimo","Porque la legitimidad de ejercicio solo depende de resultados económicos","Porque la Constitución siempre garantiza el ejercicio legítimo"], ans:1, why:"Un gobierno puede acceder al poder democráticamente (legitimidad de origen) pero ejercerlo de forma ilegítima si viola los valores y principios que justifican su existencia. Ambas dimensiones deben ocurrir para que el poder sea plenamente legítimo."},
  {topic:"Instituciones y Cambio Social", q:"¿Qué significa que la institucionalización no es lo mismo que el inmovilismo?", opts:["Que las instituciones deben cambiar constantemente sin reglas","Que las instituciones pueden y deben cambiar, pero lo que importa es que ese cambio se realice dentro de los cauces institucionales previstos, no al margen de ellos","Que solo el Estado puede modificar las instituciones","Que las instituciones son permanentes e inmodificables"], ans:1, why:"La institucionalización no equivale al inmovilismo. Las instituciones pueden y deben cambiar; lo que importa es que ese cambio se realice dentro de los cauces institucionales previstos, no al margen de ellos."}
];

let current=0, score=0, answered=[];

function init(){
  answered=new Array(Q.length).fill(null);
  current=0; score=0; render();
}

function render(){
  if(current>=Q.length){showResult();return;}
  const q=Q[current];
  const pct=Math.round((current/Q.length)*100);
  document.getElementById('pbar').style.width=pct+'%';
  const isAns=answered[current]!==null;
  document.getElementById('content').innerHTML=`
    <div class="question-card">
      <div class="q-meta">
        <span class="topic-badge">${q.topic}</span>
        <span class="counter">Pregunta ${current+1} de ${Q.length}</span>
      </div>
      <p class="q-text">${q.q}</p>
      ${q.opts.map((o,i)=>{
        let cls='';
        if(isAns){if(i===q.ans)cls='correct';else if(i===answered[current]&&i!==q.ans)cls='wrong';}
        return `<button class="option ${cls}" ${isAns?'disabled':''} onclick="choose(${i})">${String.fromCharCode(65+i)}) ${o}</button>`;
      }).join('')}
      <div class="feedback ${isAns?'show':''} ${isAns&&answered[current]===q.ans?'ok':'ko'}">
        ${isAns?(answered[current]===q.ans?'✓ Correcto. ':'✗ Incorrecto. ')+q.why:''}
      </div>
    </div>
    <div class="nav-row">
      <button class="btn" onclick="go(-1)" ${current===0?'disabled':''}>← Anterior</button>
      <span class="counter">${score} correctas de ${current} respondidas</span>
      ${current<Q.length-1
        ?`<button class="btn primary" onclick="go(1)">Siguiente →</button>`
        :`<button class="btn primary" onclick="current=Q.length;render()">Ver resultado</button>`}
    </div>`;
}

function choose(i){
  if(answered[current]!==null)return;
  answered[current]=i;
  if(i===Q[current].ans)score++;
  render();
}

function go(dir){current+=dir;render();}

function showResult(){
  document.getElementById('pbar').style.width='100%';
  const pct=Math.round((score/Q.length)*100);
  let msg=pct>=90?'¡Excelente dominio del material!':pct>=70?'Buen resultado, sigue repasando.':pct>=50?'Vas bien, pero hay temas por reforzar.':'Conviene repasar los apuntes con más detalle.';
  document.getElementById('content').innerHTML=`
    <div class="question-card score-card">
      <div class="score-num">${score}/${Q.length}</div>
      <div class="score-label">${pct}% &mdash; ${msg}</div>
      <div class="dots">
        ${answered.map((a,i)=>`<div class="dot" title="P.${i+1}: ${a===Q[i].ans?'Correcta':'Incorrecta'}" style="background:${a===Q[i].ans?'#639922':'#A32D2D'}"></div>`).join('')}
      </div>
      <p style="font-size:12px;color:#999;margin-top:10px;">Verde = correcta &nbsp;·&nbsp; Rojo = incorrecta</p>
    </div>
    <div class="nav-row" style="justify-content:center;">
      <button class="btn primary" onclick="init()">Reiniciar prueba</button>
    </div>`;
}

init();
</script>
