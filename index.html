var BASE=[
// ── AMBIGÜEDAD Y VAGUEDAD ────────────────────────────────────────────────────
{topic:"Lenguaje Jurídico",q:"Un estudiante sostiene que 'ambigüedad' y 'vaguedad' son sinónimos porque ambas reflejan lenguaje impreciso. ¿Cuál es el error?",correct:"La palabra ambigua tiene más de un significado definido; la palabra vaga tiene un significado que no está claramente delimitado, aunque se sabe a qué se refiere",wrong:["La ambigüedad es exclusiva del lenguaje jurídico; la vaguedad es propia del lenguaje coloquial","La vaguedad implica múltiples significados; la ambigüedad implica que el significado es desconocido","Ambas son equivalentes: solo se diferencian por el contexto en que se usan"],why:"La diferencia es precisa: un término ambiguo tiene más de un significado (como 'banco': institución financiera o asiento), mientras que un término vago tiene un significado conocido pero imprecisamente delimitado (como 'viejo': se sabe que refiere a mucha edad, pero no cuánta exactamente)."},
{topic:"Lenguaje Jurídico",q:"La palabra 'banco' puede referirse a una institución financiera o a un asiento. Este es un ejemplo de:",correct:"Ambigüedad por uso de palabras polisémicas, pues la misma palabra tiene varios significados definidos",wrong:["Vaguedad, pues el significado de 'banco' no está claramente delimitado","Ambigüedad por falta de contenido, pues 'banco' carece de referencia concreta","Error de prohibición, pues el hablante desconoce el significado correcto"],why:"La polisemia (varios significados definidos de una misma palabra) es la causa de ambigüedad en este caso. 'Banco' es un término ambiguo porque posee dos significados distintos y precisos, no un significado impreciso."},
{topic:"Lenguaje Jurídico",q:"Kant afirmó en la 'Crítica de la Razón Pura': 'todavía buscan los juristas dar un concepto acerca de lo que es el Derecho'. ¿Qué problema conceptual ilustra esta cita?",correct:"Que la palabra Derecho adolece de vaguedad e imprecisión: las distintas concepciones filosóficas, sociales y éticas hacen difícil delimitar su significado con exactitud",wrong:["Que el Derecho carece completamente de significado y es, por tanto, indefinible","Que Kant rechazaba la existencia del Derecho como disciplina científica","Que solo los filósofos y no los juristas son competentes para definir el Derecho"],why:"La cita ilustra la vaguedad del término Derecho: aunque todos saben aproximadamente a qué se refiere, su significado no está delimitado con exactitud, porque cada autor lo define desde su propio punto de vista (social, lógico, ético, religioso, etc.)."},
{topic:"Lenguaje Jurídico",q:"Los términos unívocos se distinguen de los términos ambiguos (equívocos o multívocos) porque:",correct:"Los unívocos tienen un solo campo de referencia, mientras que los ambiguos tienen varios campos de referencia",wrong:["Los unívocos son propios del lenguaje jurídico; los ambiguos solo existen en el lenguaje cotidiano","Los unívocos pueden ser verdaderos o falsos; los ambiguos no admiten esta calificación","Los unívocos son siempre más precisos moralmente que los ambiguos"],why:"La distinción es semántica: un término unívoco tiene un solo significado (un campo de referencia), mientras que un término ambiguo (equívoco o multívoco) tiene varios significados posibles, como ocurre con la palabra 'Derecho'."},

// ── ORIGEN DEL TÉRMINO DERECHO ───────────────────────────────────────────────
{topic:"Origen del Término Derecho",q:"¿De qué voz latina proviene la palabra Derecho, y cuál es su significado etimológico original?",correct:"De Ius, Iuris, con el que los romanos designaban al derecho, significando 'unir, vincular'; de ahí provienen justicia, jurídico, jurisprudencia",wrong:["De Directum, que los romanos usaron siempre para designar 'lo recto y encausado'","De Iustitia, de la que posteriormente derivó Ius según los historiadores romanos","De Directus, vocablo que en la Edad Media sustituyó al término Ius en toda Europa"],why:"Ius, Iuris es el origen latino del que derivan justicia, jurídico, jurisprudencia, juridicidad. La discusión sobre si Ius proviene de Iustitia o viceversa es histórica: Ulpiano consideraba que Ius deriva de Iustitia, pero los gramáticos vieron en Ius la fuente de justicia."},
{topic:"Origen del Término Derecho",q:"La palabra 'directum' sustituyó a la voz latina 'Ius' en la Edad Media. ¿Cuál es el origen y significado de 'directum'?",correct:"Es el participio pasivo del verbo 'dirigere' (dirigir, encausar) y significaba 'lo que está conforme a la regla, a la norma, lo que no se desvía'",wrong:["Es una palabra árabe introducida en Europa durante la Edad Media que significa 'mandato'","Es el plural del término 'directus' y significaba 'el conjunto de normas positivas de un territorio'","Es una contracción del latín 'directione rectum' que se refería exclusivamente al derecho canónico"],why:"'Directum' es el participio pasivo del verbo 'dirigere' (dirigir, encausar) y significaba 'lo dirigido, lo encausado, lo que está conforme a la regla o norma'. Esta sustitución de Ius por directum se atribuye a la influencia judeo-cristiana y generó las palabras romances: diritto (italiano), direito (portugués), droit (francés), right (inglés), recht (alemán)."},
{topic:"Origen del Término Derecho",q:"Ulpiano sostenía que 'Ius deriva de Iustitia'. Los historiadores, en cambio, sostenían lo contrario. ¿Cuál era el argumento de los historiadores?",correct:"Tomando en cuenta la simplicidad del término Ius, vieron en él la fuente de Iustitia; además, en Roma la vinculación entre derecho y justicia ocurrió solo en la época de los decenviros",wrong:["Los historiadores argumentaban que Iustitia es una palabra más antigua que Ius en los textos jurídicos romanos","Los historiadores sostenían que el término Ius nunca tuvo relación con la justicia en Roma","Los historiadores afirmaban que ambos términos tienen raíces griegas distintas y no se relacionan"],why:"Los historiadores, tomando en cuenta la simplicidad del término Ius, vieron en él la fuente de Iustitia. Además, la vinculación ideológica entre derecho y justicia tuvo lugar en Roma solo en la época de los decenviros; en el período anterior, Ius significaba algo así como 'mandato del más fuerte'."},

// ── SIGNIFICADOS DE LA PALABRA DERECHO ──────────────────────────────────────
{topic:"Significados del Derecho",q:"¿Cuál es la diferencia precisa entre el Derecho como 'Derecho objetivo' y el Derecho como 'Derecho subjetivo'?",correct:"El Derecho objetivo es el conjunto de normas jurídicas que regulan la convivencia; el Derecho subjetivo es la facultad que tiene una persona para exigir de otra el cumplimiento de un deber jurídico",wrong:["El Derecho objetivo regula solo las relaciones entre el Estado y los particulares; el subjetivo regula las relaciones entre privados","El Derecho objetivo es el que está escrito en los códigos; el subjetivo es el que no está codificado","El Derecho objetivo es el Derecho Natural; el subjetivo es el Derecho Positivo creado por el legislador"],why:"El Derecho objetivo es el conjunto de normas jurídicas que regulan la convivencia (Constitución, leyes, decretos, contratos, etc.), formando un ordenamiento jerarquizado y sistematizado. El Derecho subjetivo es la facultad que una persona tiene para exigir de otra el cumplimiento de un deber jurídico u obligación (ej: el derecho del acreedor a exigir el pago)."},
{topic:"Significados del Derecho",q:"Cuando se dice que 'el Derecho chileno consagra la igualdad ante la ley', ¿en qué sentido se usa la palabra Derecho?",correct:"Como sinónimo de ordenamiento jurídico: el conjunto de leyes y normas vigentes de un Estado determinado",wrong:["Como Derecho subjetivo: la facultad de cada chileno para exigir trato igualitario","Como Derecho Natural: los principios de justicia inherentes a la sociedad chilena","Como ciencia del Derecho: la disciplina que estudia las normas del ordenamiento chileno"],why:"Cuando se habla del 'Derecho chileno' se usa el término como sinónimo de ordenamiento jurídico: el conjunto de leyes y normas vigentes en Chile. Esta es una de las acepciones principales del término, distinta del Derecho como norma individual, como facultad subjetiva o como ciencia."},
{topic:"Significados del Derecho",q:"La 'dogmática jurídica' o 'ciencia del Derecho en sentido estricto' se distingue de la historia del Derecho o la sociología del Derecho porque:",correct:"Estudia las normas jurídicas vigentes en un país y en un tiempo determinados desde un punto de vista exclusivamente jurídico y normativo, no histórico ni sociológico",wrong:["Estudia el Derecho Natural y los principios morales que deben orientar al legislador positivo","Estudia el Derecho desde una perspectiva filosófica para determinar cuál debe ser el contenido de las normas","Estudia el Derecho Comparado entre distintos ordenamientos jurídicos de diferentes países"],why:"La dogmática jurídica es la ciencia del Derecho en sentido estricto: estudia las normas jurídicas vigentes en un país y en un tiempo determinados desde un punto de vista exclusivamente jurídico y normativo. Se distingue de la historia del Derecho (perspectiva histórica) y de la sociología del Derecho (perspectiva sociológica)."},

// ── DEFINICIONES DE DERECHO ──────────────────────────────────────────────────
{topic:"Definiciones de Derecho",q:"Celso definió el Derecho como 'Ius Est Ars Boni Et Aequi'. ¿Qué implica esta definición respecto de la naturaleza del Derecho?",correct:"Que el Derecho es el arte de lo bueno y lo justo, unificando los valores morales y sociales que lo jurídico implica tanto para quien redacta las leyes como para los jueces que las interpretan",wrong:["Que el Derecho es una técnica neutral de organización social, sin contenido ético ni moral","Que el Derecho es exclusivamente una ciencia formal de normas positivas, independiente de la justicia","Que el Derecho solo puede ser creado por los juristas y no por el legislador político"],why:"La definición de Celso ('el Derecho es el arte de lo bueno y de lo justo') unifica los valores morales y sociales que lo jurídico implica para el ser humano, para el jurista que redacta las leyes y para los jueces que las interpretan y aplican. Esta definición tiene una carga valorativa que supera la mera técnica normativa."},
{topic:"Definiciones de Derecho",q:"Aristóteles distinguía entre 'justicia general' y 'justicia particular'. ¿Cuál es la diferencia y qué conexión tiene con el Derecho?",correct:"La justicia general procura hacer del hombre un ser virtuoso (campo de la moral); la justicia particular asigna a cada uno lo suyo sin tomar de más ni de menos (campo del Derecho), donde actúan juristas con su actividad específica",wrong:["La justicia general es la que aplican los jueces; la justicia particular es la que aplica el legislador al crear las normas","La justicia general corresponde al Derecho Internacional; la particular al Derecho interno de cada Estado","La justicia general es la distributiva; la justicia particular es la conmutativa, siendo ambas propias del Derecho"],why:"Para Aristóteles, la justicia general nos pone en el campo de la moral (procura que el hombre adecue su conducta a las leyes morales: que sea virtuoso, honesto, valiente). La justicia particular nos pone en el campo del Derecho: que el ciudadano no tome ni más ni menos de lo que le corresponde, que a cada uno se le asigne lo suyo."},
{topic:"Definiciones de Derecho",q:"La justicia distributiva de Aristóteles se rige por una proporción geométrica y la conmutativa por una aritmética. ¿Qué significa exactamente esa distinción?",correct:"La distributiva reparte según el mérito de las personas (A/B = C/D): lo que cada uno recibe es proporcional a sus aportes. La conmutativa busca equivalencia exacta entre prestaciones, sin considerar el valor de las personas",wrong:["La distributiva se aplica en juicios civiles; la conmutativa en juicios penales, independientemente del mérito","La distributiva regula impuestos proporcionales al ingreso; la conmutativa regula contratos de compraventa únicamente","La distributiva solo aplica al Estado al repartir bienes públicos; la conmutativa solo entre particulares en contratos"],why:"La justicia distributiva usa proporcionalidad geométrica (A/B = C/D): lo que cada persona recibe debe ser proporcional a sus méritos y aportes; si las personas no son iguales, no se les asignan cosas iguales. La conmutativa busca equivalencia exacta (aritmética) entre la cosa recibida y la contraprestación, sin importar el valor de las personas involucradas."},
{topic:"Definiciones de Derecho",q:"Santo Tomás de Aquino aceptó la división de Aristóteles sobre la justicia, pero añadió un tipo que Aristóteles no contemplaba. ¿Cuál es ese aporte original y a qué se refiere?",correct:"La justicia legal, que regula lo que los individuos deben a la comunidad de que forman parte (dirección inversa a la distributiva, que regula lo que la comunidad debe a los individuos)",wrong:["La justicia penal, que regula las sanciones que el Estado impone a quienes violan las normas","La justicia natural, que regula los derechos inherentes al hombre por su sola naturaleza racional","La justicia social, que regula la redistribución de la riqueza entre los distintos grupos de la sociedad"],why:"El aporte original de Santo Tomás es la justicia legal: regula la situación inversa a la distributiva, es decir, lo que los individuos deben a la comunidad de que forman parte (tributos, servicio militar, cumplimiento de la ley). Aristóteles ya había contemplado la conmutativa (cambios entre individuos) y la distributiva (lo que la comunidad debe a los individuos)."},

// ── SEGURIDAD JURÍDICA ───────────────────────────────────────────────────────
{topic:"Seguridad Jurídica",q:"Max Mayer definió la seguridad jurídica como la garantía de que la persona, sus bienes y derechos no serán objeto de ataques violentos. ¿Por qué se criticó esta definición?",correct:"Porque se señala que estaría haciendo alusión a otros valores distintos de la seguridad jurídica propiamente tal, como la justicia, la libertad y la igualdad",wrong:["Porque Mayer omitió la dimensión procesal de la seguridad jurídica, olvidando el rol de los tribunales","Porque Mayer solo consideró la seguridad de los bienes materiales, excluyendo los derechos fundamentales","Porque Mayer confundió seguridad jurídica con seguridad pública, que es una función policial del Estado"],why:"La crítica a la definición de Max Mayer es que al referirse a la garantía de protección y reparación de la persona, sus bienes y derechos frente a ataques violentos, estaría aludiendo a otros valores como la justicia, la libertad y la igualdad, más que a la seguridad jurídica en sentido estricto."},
{topic:"Seguridad Jurídica",q:"Radbruch exige que el Derecho positivo, para cumplir con la seguridad jurídica, reúna cuatro requisitos. ¿Cuál de los siguientes NO es uno de esos requisitos?",correct:"Que el Derecho sea justo, es decir, que su contenido coincida con los principios del Derecho Natural",wrong:["Que el Derecho sea positivo, concretado en normas vigentes","Que el Derecho tenga un mínimo de estabilidad y no esté sometido a cambios permanentes","Que el Derecho sea conocido por los sujetos que deben cumplirlo"],why:"Los cuatro requisitos de Radbruch para la seguridad jurídica son: (1) que el Derecho sea positivo (vigente), (2) que se base en hechos establecidos con el menor margen de error, (3) que tenga un mínimo de estabilidad, y (4) que sea conocido. La justicia del contenido no figura como requisito de la seguridad jurídica según Radbruch; esa es una exigencia de otro valor: la justicia misma."},
{topic:"Seguridad Jurídica",q:"El principio de irretroactividad de la ley (Art. 9 CC: 'la ley puede sólo disponer para lo futuro') es obligatorio para el juez pero no para el legislador. ¿Cuáles son las dos limitaciones constitucionales que el legislador sí debe respetar?",correct:"No puede dictar leyes retroactivas más desfavorables en materia penal, y no puede dictar leyes retroactivas en materia de derecho de propiedad (Art. 19 N°24 CPR)",wrong:["No puede dictar leyes retroactivas en ningún caso en materia civil ni penal, pues la CPR lo prohíbe absolutamente","No puede dictar leyes retroactivas en materia tributaria ni de familia, aunque sí en materia penal","Solo está limitado en materia de derecho de propiedad; en materia penal puede legislar retroactivamente sin restricciones"],why:"El legislador puede dictar leyes retroactivas, pero con dos límites constitucionales: (1) en materia penal, no puede dictar leyes retroactivas más desfavorables para el inculpado (sí puede si lo favorece); (2) en materia de derecho de propiedad, la CPR Art. 19 N°24 prohíbe las leyes retroactivas."},
{topic:"Seguridad Jurídica",q:"El principio de reserva de legalidad en materia penal (Art. 19 N°3 CPR) postula que 'no hay delito ni pena sin ley previa'. ¿Qué exige exactamente ese principio?",correct:"Que para que una conducta sea castigada como delito debe existir una ley previa que la sancione como tal y que establezca la duración y naturaleza de la pena",wrong:["Que solo el Poder Judicial puede definir qué conductas constituyen delitos, excluyendo al legislador","Que las penas solo pueden aplicarse si el imputado conocía la norma al momento de cometer el delito","Que el juez puede crear tipos penales por analogía cuando la ley no contemple expresamente la conducta"],why:"El principio de reserva de legalidad penal exige: (1) que exista una ley previa que incrimine el hecho; (2) que esa ley establezca la clase de castigo; y (3) que la conducta que se sancione esté expresamente descrita en la ley. 'Ningún delito se castigará con otra pena que la que señale una ley promulgada con anterioridad a su perpetración.'"},
{topic:"Seguridad Jurídica",q:"La cosa juzgada requiere 'triple identidad'. ¿Cuál es la diferencia entre identidad de cosa pedida e identidad de causa de pedir?",correct:"La cosa pedida es el beneficio jurídico inmediato que se reclama; la causa de pedir es el fundamento inmediato del derecho deducido en juicio (el hecho jurídico que sirve de base a la pretensión)",wrong:["La cosa pedida es el objeto material en disputa; la causa de pedir es la acción procesal ejercida en el juicio","La cosa pedida es la pretensión procesal; la causa de pedir es la norma legal que la ampara","La cosa pedida y la causa de pedir son sinónimos: ambas se refieren al fundamento jurídico de la demanda"],why:"La distinción es precisa: la identidad de cosa pedida se refiere al beneficio jurídico inmediato que se reclama (lo que se pide en la demanda). La identidad de causa de pedir se refiere al fundamento inmediato del derecho deducido en juicio (el hecho jurídico que justifica la pretensión). Ej: pedir dominio por compra vs. pedir dominio por herencia tiene distinta causa de pedir aunque el objeto sea el mismo."},
{topic:"Seguridad Jurídica",q:"¿Por qué la presunción de conocimiento de la ley (Art. 8 CC) es en rigor una presunción de conocimiento del Derecho, y no meramente de la ley?",correct:"Porque la finalidad es de seguridad jurídica: si se permitiera alegar ignorancia, los individuos podrían desconocer deberes jurídicos impuestos por normas vigentes, afectando la certeza del Derecho en su conjunto",wrong:["Porque en Chile el Derecho incluye la costumbre y los actos jurídicos, que no son estrictamente 'ley'","Porque la expresión 'ley' en el Art. 8 CC se refiere solo al Código Civil y no a otras normas","Porque la presunción fue creada por los decenviros romanos que usaban el término Ius para referirse al Derecho en general"],why:"La presunción del Art. 8 CC (nadie puede alegar ignorancia de la ley) funciona como presunción de conocimiento del Derecho porque su fundamento es la seguridad jurídica: si los individuos pudieran alegar ignorancia, podrían desconocer deberes jurídicos impuestos por normas vigentes, lo que haría imposible el orden social."},

// ── PERSONA HUMANA ───────────────────────────────────────────────────────────
{topic:"Persona Humana",q:"¿Cuál es la diferencia entre individualidad y personalidad como características del ser humano?",correct:"La individualidad es el elemento diferenciador que distingue un individuo de otro dentro de una misma especie; la personalidad se refiere al ser espiritual y su subsistencia, no a la materia",wrong:["La individualidad pertenece al ámbito jurídico (persona jurídica); la personalidad al ámbito filosófico (persona natural)","La individualidad es exclusiva del ser humano; la personalidad es compartida con los animales superiores","La individualidad refiere a los derechos inherentes; la personalidad refiere a los deberes que el Derecho impone"],why:"La individualidad es el elemento diferenciador dentro de una especie: cada hombre es un individuo, al igual que una planta o un animal. La personalidad, en cambio, no dice relación con la materia sino con el ser espiritual y su subsistencia: es la energía metafísica (espíritu) que junto con la potencia material forma una unidad sustancial. Por eso, todo hombre es persona, pero no todo individuo (vegetal, animal) es persona."},
{topic:"Persona Humana",q:"Santo Tomás de Aquino expresó: 'persona significa lo más perfecto que hay en toda la naturaleza, o sea el ser subsistente en la naturaleza racional'. ¿Qué implicación tiene esta definición para la relación entre hombre y persona?",correct:"Que todo hombre es persona porque el hombre, dotado de espíritu y razón, es un ser subsistente en una naturaleza racional; a diferencia de los animales o vegetales que, siendo individuos, no son personas por carecer de personalidad espiritual",wrong:["Que solo algunos hombres son personas: los que poseen mayor desarrollo intelectual y racional","Que la persona es una categoría jurídica, no ontológica, que el Estado otorga al ser humano","Que el concepto de persona en Santo Tomás equivale al de ciudadano en el Derecho Romano"],why:"Para Santo Tomás, persona es el ser subsistente en la naturaleza racional. Todo hombre posee espíritu (principio de unidad, independencia y libertad), por lo que todo hombre es persona. Un animal, aunque es individuo, no es persona porque carece de ese principio espiritual que lo haría capaz de elevarse sobre los fenómenos sensibles."},
{topic:"Persona Humana",q:"La diferencia entre libertad física y libertad moral según los apuntes consiste en que:",correct:"La libertad física se extiende tanto a lo bueno como a lo malo, a lo lícito como a lo ilícito; la libertad moral se contiene dentro del orden racional y consiste en escoger el medio más adecuado para alcanzar el bien del hombre",wrong:["La libertad física es la que el Estado garantiza mediante normas jurídicas; la moral es la que regula la Iglesia","La libertad física pertenece solo al ámbito del Derecho Penal; la moral solo al ámbito del Derecho Civil","La libertad física y la moral son equivalentes: ambas refieren a la autonomía del individuo frente al Estado"],why:"La libertad física se extiende tanto a lo bueno como a lo malo, a lo lícito como a lo ilícito (capacidad de elegir). La libertad moral se contiene dentro del orden racional y consiste en la facultad de escoger entre los diversos medios aquel más adecuado para alcanzar el bien del hombre. De ambas, la esencial al hombre es la libertad moral."},
{topic:"Persona Humana",q:"La trascendencia como característica humana está vinculada a que 'la persona humana trasciende perpetua y continuamente su limitación actual'. ¿Qué significa esto según los apuntes?",correct:"Que el hombre es un ser finito cuyo centro último está en un ser infinito: su naturaleza espiritual trasciende hacia instancias superiores (Dios, el Absoluto o los valores, según la doctrina que se profese)",wrong:["Que el ser humano es capaz de superar biológicamente a los demás animales mediante el uso de herramientas","Que la trascendencia humana consiste en la capacidad de dejar un legado histórico a las generaciones futuras","Que el ser humano puede trascender las normas jurídicas de su época cuando entran en conflicto con su conciencia"],why:"La trascendencia en este contexto filosófico-jurídico refiere a que la persona humana es un ser finito cuyo centro último está en un ser infinito. Su naturaleza espiritual la hace trascender hacia instancias superiores: Dios, el Absoluto o los valores, según sea la doctrina que se profese (religiosa o filosófica)."},

// ── HOMBRE Y SOCIEDAD / CONTRACTUALISMO ─────────────────────────────────────
{topic:"Hombre y Sociedad",q:"Hobbes y Locke difieren radicalmente en su concepción del 'estado de naturaleza'. ¿Cuál es la diferencia fundamental?",correct:"Para Hobbes el estado de naturaleza es un estado de guerra permanente ('homo homini lupus'); para Locke es un estado de perfecta libertad limitada por la ley de la naturaleza y la razón, no equivalente a un estado de guerra",wrong:["Para Hobbes el estado de naturaleza es positivo; para Locke es negativo porque el hombre es naturalmente egoísta","Para Hobbes el estado de naturaleza conduce a la democracia; para Locke conduce al absolutismo monárquico","Para ambos el estado de naturaleza es idéntico: un estado de conflicto que se resuelve mediante el contrato social"],why:"La diferencia es crucial: para Hobbes el estado de naturaleza es una guerra de todos contra todos ('homo homini lupus'), negativo por definición. Para Locke es un estado de perfecta libertad (pues el hombre no depende de nadie), aunque limitada por la ley de la naturaleza y la razón; no es un estado de guerra sino de libertad."},
{topic:"Hombre y Sociedad",q:"Rousseau sostiene que 'el hombre es bueno de naturaleza'. ¿Cómo explica entonces el origen de los conflictos sociales que llevan al contrato?",correct:"El contrato social aparece a raíz de los conflictos generados por la propiedad privada en el estado de naturaleza, no por maldad innata del hombre",wrong:["Rousseau sostiene que los conflictos nacen de la debilidad biológica del hombre que lo obliga a asociarse para sobrevivir","Rousseau afirma que los conflictos son causados por la religión, que impone normas contrarias a la voluntad general","Rousseau explica los conflictos como resultado de las diferencias intelectuales entre los hombres"],why:"Rousseau eleva el estado de naturaleza a un estado histórico ejemplar donde el hombre es bueno por naturaleza. El contrato social surge de los conflictos que, en ese estado de naturaleza, se generan por causa de la propiedad privada. Por eso Rousseau propone que la libertad se logra otorgando la voluntad total al Estado a través del contrato social."},
{topic:"Hombre y Sociedad",q:"Kant distingue su posición contractualista de la de Hobbes, Locke y Rousseau en un aspecto clave. ¿Cuál es?",correct:"Para Kant salir del estado de naturaleza y someterse a las leyes del estado civil no es meramente conveniente sino una obligación, un deber moral; el concepto clave es la autonomía de los seres humanos",wrong:["Para Kant el estado de naturaleza es pacífico, a diferencia de Hobbes; por eso el contrato es opcional y no obligatorio","Para Kant el contrato social es innecesario porque la naturaleza racional del hombre basta para regular la convivencia","Para Kant el Estado debe garantizar solo la libertad económica de los individuos, no sus derechos políticos"],why:"La diferencia kantiana es que someterse a las leyes del estado civil no es solo conveniente sino un deber moral. El concepto clave de Kant es la autonomía: el soberano debe legislar según la voluntad unida del pueblo, cada persona debe actuar según las leyes morales que ella misma se da, y el Estado garantiza la colibertad (compatibilidad de las libertades de todas las personas)."},
{topic:"Hombre y Sociedad",q:"La autotutela, la autocomposición y el proceso son formas de solución de conflictos. ¿Cuál es la diferencia entre la conciliación y el avenimiento, siendo ambas formas de autocomposición?",correct:"La conciliación es una forma de transacción que ocurre durante el litigio con intervención del juez como amigable componedor; el avenimiento también pone fin al juicio por acuerdo de las partes, pero sin intervención del juez como amigable componedor",wrong:["La conciliación se produce antes del juicio; el avenimiento se produce después de la sentencia definitiva","La conciliación requiere acuerdo unánime de todas las partes; el avenimiento puede ser decidido por mayoría","La conciliación es un acto administrativo del juez; el avenimiento es una sentencia interlocutoria del tribunal"],why:"Ambas son formas de autocomposición, pero la conciliación ocurre durante el litigio con el juez como amigable componedor (acto procesal). El avenimiento también termina un juicio pendiente por acuerdo de las partes, pero sin que el juez tenga el papel de amigable componedor, por lo que no es un acto procesal; debe ser presentado ante el juez para que lo dé por finalizado."},

// ── NORMAS DE CONDUCTA ───────────────────────────────────────────────────────
{topic:"Normas de Conducta",q:"La distinción entre 'ser' y 'deber ser' es fundamental para la teoría de las normas. ¿Quién la empleó primero con el sentido que hoy se le atribuye y en qué obra?",correct:"David Hume, en su obra 'Tratado de la Naturaleza Humana', sostuvo que el ser y el deber ser se encuentran radicalmente separados y que lógicamente no se puede transitar del uno al otro",wrong:["Hans Kelsen, en su obra 'Teoría Pura del Derecho', formuló por primera vez esta distinción como principio de imputación","Immanuel Kant, en su obra 'Crítica de la Razón Pura', introdujo la separación entre el ser y el deber ser en la filosofía moderna","Aristóteles, en su 'Ética a Nicómaco', distinguió entre las leyes de la naturaleza (ser) y las normas morales (deber ser)"],why:"Fue David Hume quien empleó primero la distinción ser/deber ser con el sentido actual, en su 'Tratado de la Naturaleza Humana'. Luego fue recogida y desarrollada por Kant en la 'Crítica de la Razón Práctica', y posteriormente por Hans Kelsen en la 'Teoría Pura del Derecho', quien la expresó mediante el principio de imputación (opuesto al de causalidad)."},
{topic:"Normas de Conducta",q:"Kelsen distingue entre el principio de causalidad (que rige el ser) y el principio de imputación (que rige el deber ser). ¿Cuál es la diferencia entre ambos principios?",correct:"La causalidad vincula fenómenos de manera necesaria (la causa produce necesariamente el efecto); la imputación vincula una conducta antecedente con una consecuencia que debe atribuírsele, pero sin necesidad: puede no ocurrir en los hechos",wrong:["La causalidad opera solo en el Derecho Natural; la imputación opera solo en el Derecho Positivo","La causalidad es el principio de las normas morales; la imputación es el principio de las leyes naturales","La causalidad y la imputación son idénticos: ambos vinculan hechos de manera necesaria en el mundo jurídico"],why:"La diferencia es esencial: en el ámbito del ser (naturaleza), el principio de causalidad vincula fenómenos de manera necesaria (si hay causa, hay efecto inevitablemente). En el ámbito del deber ser (normas), el principio de imputación vincula conducta antecedente con consecuencia que debe atribuírsele, pero sin necesidad: si alguien comete homicidio 'debe' ser sancionado, pero puede que en los hechos no lo sea (si no fue descubierto o escapó)."},
{topic:"Normas de Conducta",q:"Desde una perspectiva lingüística, las normas pertenecen al lenguaje prescriptivo. ¿Cuál es la diferencia entre el lenguaje directivo en general y el prescriptivo en particular?",correct:"El directivo busca influir en la conducta de otro mediante ruegos, sugerencias, peticiones o mandatos; el prescriptivo es una subclase del directivo que se distingue por impartir órdenes o mandatos con mayor fuerza, donde el emisor se coloca en posición de superioridad",wrong:["El lenguaje directivo es propio de las normas morales; el prescriptivo es exclusivo de las normas jurídicas","El directivo puede ser verdadero o falso; el prescriptivo solo puede ser justo o injusto","El prescriptivo es más amplio que el directivo: el directivo es solo una clase de prescripciones"],why:"El lenguaje directivo busca influir en la conducta de otro y admite diversas subclases: ruegos, sugerencias, recomendaciones, peticiones, reclamaciones, órdenes. El prescriptivo es una subclase del directivo que se distingue por impartir órdenes o mandatos, donde quien los formula se coloca en posición de superioridad física o moral y no supedita el cumplimiento a la voluntad del destinatario (a diferencia del consejo o petición)."},
{topic:"Normas de Conducta",q:"Una norma puede ser válida pero ineficaz. ¿Cuál es la diferencia entre validez y eficacia de una norma jurídica?",correct:"La validez refiere a la existencia de la norma: es válida si fue creada por autoridad competente mediante el procedimiento establecido. La eficacia refiere a si efectivamente es obedecida por los sujetos y aplicada por los órganos jurisdiccionales",wrong:["La validez refiere a si la norma es justa; la eficacia refiere a si la norma ha sido publicada en el Diario Oficial","La validez es el reconocimiento internacional de la norma; la eficacia es su aplicación interna por los tribunales","Validez y eficacia son sinónimos: una norma válida siempre es eficaz porque cuenta con el respaldo del Estado"],why:"La validez refiere a la existencia de la norma en el ordenamiento: una norma es válida si fue creada por autoridad competente, mediante el procedimiento establecido y dentro de los límites de contenido. La eficacia refiere al comportamiento real: una norma es eficaz si es obedecida por los sujetos y aplicada por los tribunales. Pueden existir normas válidas pero ineficaces (como el adulterio que era delito válido pero nadie fue condenado)."},
{topic:"Normas de Conducta",q:"¿Cuál es la diferencia fundamental entre una norma de conducta y una regla técnica, según Squella?",correct:"La norma presupone un juicio de valor y ordena una conducta mirando al valor de los fines; la regla técnica presupone un juicio de realidad y prescribe el modo de obrar para alcanzar un fin práctico, mirando a la eficacia de los resultados",wrong:["La norma de conducta es creada por el Estado; la regla técnica es creada por organismos técnicos privados","La norma de conducta es coercible; la regla técnica es siempre incoercible por su naturaleza técnica","La norma de conducta regula relaciones entre personas; la regla técnica solo regula relaciones entre cosas"],why:"Squella señala que las reglas técnicas 'se refieren no propiamente a un deber de los sujetos, sino a necesidades que éstos tienen que observar cuando se proponen un fin determinado; menos que un deber ser, indican un tener que'. La norma ordena una conducta con base en un valor; la regla indica cómo hacer algo eficazmente para alcanzar un fin práctico. La regla puede subordinarse a la norma, pero nunca la norma a la regla."},

// ── LEYES NATURALES VS NORMAS ─────────────────────────────────────────────────
{topic:"Leyes Naturales vs Normas",q:"¿Por qué las leyes naturales son 'válidas cuando son verdaderas' mientras que las normas de conducta no se califican de verdaderas o falsas?",correct:"Porque las leyes naturales pertenecen al lenguaje descriptivo: describen relaciones constantes entre fenómenos y pueden ser verdaderas (si coinciden con la realidad) o falsas. Las normas son lenguaje prescriptivo: no describen, sino que prescriben conductas y se califican de justas/injustas o válidas/inválidas",wrong:["Porque las leyes naturales son creadas por Dios, cuya verdad es absoluta; las normas son creadas por el hombre y por eso son relativas","Porque las leyes naturales son universales; las normas de conducta son particulares a cada sociedad y por eso no pueden ser universalmente verdaderas","Porque las leyes naturales se verifican por inducción científica; las normas de conducta solo pueden verificarse por deducción lógica"],why:"Las leyes naturales pertenecen al lenguaje descriptivo (afirman relaciones constantes entre fenómenos naturales) y por eso pueden ser verdaderas o falsas (según si coinciden con lo que ocurre en la realidad). Las normas pertenecen al lenguaje prescriptivo (no describen ni narran, sino que prescriben, ordenan conductas) y por eso no se califican de verdaderas o falsas sino de justas/injustas, válidas/inválidas, eficaces/ineficaces."},
{topic:"Leyes Naturales vs Normas",q:"Las leyes naturales 'no son causas de los fenómenos a que aluden'. ¿Qué significa esta afirmación y qué distinción establece?",correct:"Las leyes naturales no producen los fenómenos, sino que simplemente revelan sus antecedentes y consecuencias: son fórmulas destinadas a explicar las relaciones entre fenómenos, no los fenómenos mismos",wrong:["Las leyes naturales son meras descripciones estadísticas sin valor explicativo causal","Las leyes naturales son creadas por los hombres para describir la naturaleza y por eso no tienen causalidad real","Las leyes naturales son normas de conducta de segunda categoría que regulan el comportamiento de los seres vivos"],why:"Las leyes naturales establecen relaciones de causalidad pero no las crean: revelan antecedentes y consecuencias de los fenómenos, pero no producen esos fenómenos. Es un error creer que 'la ley de la gravedad hace caer los objetos': la ley simplemente describe la relación entre la masa y la atracción. Las leyes naturales son fórmulas explicativas, no causas."},

// ── CRITERIOS DE DIFERENCIACIÓN DE NORMAS ───────────────────────────────────
{topic:"Criterios de Diferenciación",q:"Squella distingue entre 'heteronomía de origen' y 'heteronomía de imperio'. ¿Cuál es la diferencia?",correct:"La heteronomía de origen significa que la norma es producida por un sujeto diverso del que debe cumplirla; la heteronomía de imperio significa que la norma debe acatarse aunque el sujeto no haya participado en su creación y aunque no esté de acuerdo con su contenido",wrong:["La heteronomía de origen refiere a la fuente histórica de la norma; la de imperio refiere a su aplicación territorial","La heteronomía de origen es propia de las normas consuetudinarias; la de imperio es propia de las normas legales","La heteronomía de origen y la de imperio son sinónimos: Squella los usa indistintamente para referirse a la misma característica"],why:"La heteronomía de origen refiere a quién produce la norma: es una persona o autoridad distinta del sujeto que debe cumplirla. La heteronomía de imperio refiere a la obligatoriedad: la norma debe acatarse aunque el sujeto no haya participado en su génesis y aunque no esté de acuerdo con su contenido, sin posibilidad de eximirse por razones políticas o éticas personales."},
{topic:"Criterios de Diferenciación",q:"¿En qué sentido las normas jurídicas son 'preferentemente heterónomas' y no absolutamente heterónomas?",correct:"Porque existen excepciones donde el sujeto obligado participa en su elaboración: en el ámbito político (democracia), jurídico (costumbre y actos jurídicos), social (normas ineficaces) y moral (objeción de conciencia)",wrong:["Porque las normas jurídicas siempre permiten que el sujeto se oponga a ellas mediante recursos administrativos","Porque las normas jurídicas son autónomas en la mayoría de los casos y solo excepcionalmente son heterónomas","Porque la autonomía es la característica dominante de las normas jurídicas en los sistemas democráticos modernos"],why:"Las normas jurídicas son 'preferentemente heterónomas' porque reconocen excepciones: en el ámbito político (la democracia permite participar en la elección de quien dicta normas), jurídico (costumbre y actos jurídicos son fuentes con grado de autonomía), social (normas válidas pero ineficaces porque los sujetos no las cumplen influyen en su aplicación) y moral (objeción de conciencia reconocida por el ordenamiento)."},
{topic:"Criterios de Diferenciación",q:"La diferencia entre normas exteriores e interiores se ilustra con el ejemplo del domicilio y la posesión en el Código Civil chileno. ¿Por qué estos institutos son 'salvedades al carácter exterior' de las normas jurídicas?",correct:"Porque para determinar el domicilio hay que indagar en el ánimo de permanencia (fuero interno) y para determinar la posesión hay que verificar el ánimo de señor o dueño; sin esos elementos internos no hay domicilio ni posesión sino mera residencia o tenencia",wrong:["Porque el domicilio y la posesión son conceptos que el Derecho toma del Derecho Natural, que es interior por su naturaleza","Porque en materia civil el juez puede valorar la buena fe del sujeto, lo que convierte toda la norma civil en interior","Porque el ánimo en domicilio y posesión es una presunción legal que no requiere prueba del fuero interno del sujeto"],why:"El carácter exterior de las normas jurídicas admite salvedades: para saber si hay domicilio no basta la residencia objetiva, sino que hay que indagar en el ánimo de permanencia (elemento interno). Para saber si hay posesión no basta la tenencia, sino que se requiere el ánimo de señor o dueño. Sin esos elementos internos solo hay residencia o mera tenencia. Igualmente en Derecho Penal: el dolo (intención) distingue el delito del cuasidelito."},
{topic:"Criterios de Diferenciación",q:"Las normas de trato social son unilaterales. ¿Por qué esta característica las distingue de las normas jurídicas que son bilaterales?",correct:"Porque frente al deber que impone la norma de trato social no existe ningún sujeto específico facultado para exigir su cumplimiento; en las normas jurídicas bilaterales, en cambio, al deber de uno corresponde la facultad de otro para exigirlo",wrong:["Porque las normas de trato social obligan a ambas partes de una relación social, a diferencia de las jurídicas que solo obligan a una","Porque las normas de trato social son bilaterales en cuanto a su creación (por el grupo social) pero unilaterales en su aplicación","Porque la bilateralidad de las normas jurídicas significa que requieren dos actos para su creación, a diferencia de las sociales"],why:"La unilateralidad significa que la norma solo impone deberes sin que exista otro sujeto facultado para exigir su cumplimiento. En las normas jurídicas bilaterales, al deber del sujeto pasivo corresponde la facultad del sujeto activo de exigir ese cumplimiento (ej: en la compraventa, el vendedor tiene obligación de entregar y el comprador tiene derecho de exigir la entrega)."},
{topic:"Criterios de Diferenciación",q:"¿Cuál es la diferencia entre coercibilidad y coacción, y por qué es importante distinguirlos?",correct:"La coercibilidad es la posibilidad de usar la fuerza socialmente organizada (fuerza en potencia); la coacción es el hecho efectivo del uso de esa fuerza (fuerza en acto). Las normas son necesariamente coercibles pero solo eventualmente coactivas",wrong:["La coercibilidad es exclusiva de las normas jurídicas; la coacción puede aplicarse también en las normas morales","La coercibilidad implica que la fuerza ya fue ejercida; la coacción implica que la fuerza podría ejercerse en el futuro","La coercibilidad y la coacción son sinónimos: ambas refieren al uso efectivo de la fuerza del Estado para sancionar"],why:"La distinción es fundamental: coercibilidad es la posibilidad legítima de hacer uso de la fuerza socialmente organizada (existe siempre). La coacción es el ejercicio efectivo de esa fuerza (puede no llegar a existir). Ejemplo: si el homicida no es descubierto, hay coercibilidad (la norma penal existe con su sanción) pero no hay coacción (la fuerza no fue efectivamente ejercida)."},

// ── NORMAS DE TRATO SOCIAL, RELIGIOSAS, MORALES Y JURÍDICAS ─────────────────
{topic:"Tipos de Normas",q:"Las normas religiosas son 'preferentemente heterónomas' pero reconocen un grado de autonomía. ¿Cómo concilia Squella esta aparente contradicción?",correct:"Las normas religiosas no son autónomas en cuanto a su origen (vienen impuestas por la divinidad), pero sí lo son desde el punto de vista del imperio, pues cada sujeto decide libremente si adopta o no una religión determinada y sus normas",wrong:["Las normas religiosas son autónomas porque cada creyente puede reinterpretar las normas divinas según su propia conciencia","Las normas religiosas son autónomas porque su creación es producto de la acción colectiva de los fieles de una comunidad","Las normas religiosas son autónomas porque el Estado no interviene en su creación ni en su aplicación"],why:"Squella señala que las normas religiosas no son autónomas en cuanto a su origen porque vienen impuestas por la divinidad o sus representantes terrenales. Pero son autónomas desde el punto de vista del imperio: cada sujeto decidirá si adopta o no una determinada religión y sus normas. Una vez que libremente adhiere a una fe, acepta y hace suyas sus normas."},
{topic:"Tipos de Normas",q:"Las normas morales son interiores 'principalmente'. ¿Por qué la palabra 'principalmente' es importante en esa caracterización?",correct:"Porque aunque las normas morales consideran la dimensión interna de la conducta para calificarla como moral o inmoral, también les interesa la dimensión externa: se espera que se reflejen en buenas acciones y obras",wrong:["Porque algunas normas morales regulan solo conductas externas cuando afectan a terceros, siendo en esos casos equivalentes a las jurídicas","Porque la moralidad es principalmente un asunto del fuero externo que el grupo social evalúa, y solo secundariamente del fuero interno","Porque el legislador puede convertir normas morales en jurídicas, cambiando su carácter de interior a exterior"],why:"Las normas morales son interiores principalmente porque parten del aspecto interno de la conducta para calificarla de moral o inmoral y considerar las motivaciones del sujeto. Sin embargo, también les interesa el aspecto externo porque de estas normas se espera que se reflejen en buenas acciones y obras hacia los demás."},
{topic:"Tipos de Normas",q:"¿Cuál es la principal diferencia entre las normas morales y las normas jurídicas en términos de la relación entre autonomía/heteronomía y unilateralidad/bilateralidad?",correct:"Las normas morales son autónomas y unilaterales (nacen de la propia voluntad del sujeto y no hay nadie que pueda exigir su cumplimiento); las jurídicas son heterónomas y bilaterales (provienen de autoridad externa y correlativamente dan facultad de exigir cumplimiento)",wrong:["Las normas morales son heterónomas y bilaterales; las jurídicas son autónomas y unilaterales","Las normas morales y jurídicas son igualmente heterónomas, distinguiéndose solo por la sanción que aplica cada una","Las normas morales son autónomas y bilaterales; las jurídicas son heterónomas y unilaterales"],why:"La diferencia es sistemática: las normas morales son autónomas (nacen de la voluntad del propio sujeto que las reconoce como válidas en su conciencia) y unilaterales (nadie puede exigir externamente su cumplimiento; la sanción es el remordimiento). Las normas jurídicas son heterónomas (la autoridad normativa es distinta del sujeto obligado) y bilaterales (al deber de uno corresponde la facultad de otro para exigirlo)."},
{topic:"Tipos de Normas",q:"¿Qué característica de las normas jurídicas las distingue fundamentalmente de todos los demás tipos de normas (morales, religiosas, de trato social)?",correct:"La coercibilidad: ante su incumplimiento existe la legítima posibilidad de hacer uso de la fuerza socialmente organizada para obtener el cumplimiento o aplicar una sanción, lo que no ocurre con las demás normas",wrong:["La heteronomía: las normas jurídicas son las únicas producidas por una autoridad externa al sujeto obligado","La bilateralidad: las normas jurídicas son las únicas que imponen deberes correlativos a facultades de exigirlos","La exterioridad: las normas jurídicas son las únicas que regulan conductas externas sin importar el fuero interno"],why:"La coercibilidad es el rasgo definitorio que distingue a las normas jurídicas de todas las demás: ante su incumplimiento existe la legítima posibilidad de hacer uso de la fuerza socialmente organizada (ordenada por los tribunales, ejecutada por la fuerza pública). Las normas morales, religiosas y de trato social son incoercibles: sus sanciones son el remordimiento, la pérdida del estado de gracia o el rechazo social, respectivamente."},

// ── ESTRUCTURA LÓGICA DE LAS NORMAS ─────────────────────────────────────────
{topic:"Estructura Lógica de Normas",q:"¿Por qué la teoría tradicional que postula que las normas jurídicas son juicios categóricos ('S debe ser P') fue rechazada por la mayoría de los juristas?",correct:"Porque las normas jurídicas no son juicios en el sentido lógico (no pertenecen al lenguaje descriptivo que puede ser verdadero o falso, sino al prescriptivo) y porque la fórmula categórica no permite distinguir entre norma jurídica y norma moral",wrong:["Porque los juicios categóricos son propios de las matemáticas y no pueden aplicarse a fenómenos sociales como el Derecho","Porque la fórmula categórica es demasiado compleja para aplicarse a las normas jurídicas cotidianas","Porque el juicio categórico no puede ser expresado en términos lingüísticos de deber ser, siendo incompatible con el Derecho"],why:"La teoría tradicional fue rechazada por dos razones: (1) las normas no son juicios desde un punto de vista lógico (no pertenecen al lenguaje descriptivo sino al prescriptivo; no pueden ser verdaderas o falsas sino justas/injustas); (2) la fórmula 'S debe ser P' no permite distinguir entre una norma jurídica y una norma moral, pues ambas tendrían idéntica estructura bajo ese esquema."},
{topic:"Estructura Lógica de Normas",q:"Kelsen distingue entre 'reglas de Derecho' y 'normas jurídicas'. ¿En qué consiste esa distinción?",correct:"Las reglas de Derecho (proposiciones normativas) son descripciones o estudios que los juristas hacen sobre el Derecho vigente (como un manual de Derecho civil): no son obligatorias. Las normas jurídicas son prescripciones que emanan de autoridad, regulan la convivencia y están sancionadas por la fuerza: son obligatorias",wrong:["Las reglas de Derecho son normas constitucionales; las normas jurídicas son las normas de rango legal ordinario","Las reglas de Derecho son las que crean los particulares mediante contratos; las normas jurídicas las que crea el Estado","Las reglas de Derecho y las normas jurídicas son sinónimos que Kelsen usa en distintos momentos de su obra"],why:"La distinción kelseniana es entre dos niveles: las reglas de Derecho (proposiciones normativas) son lo que los juristas escriben sobre el Derecho vigente en manuales y textos de estudio: no son obligatorias, solo explican cuál es el Derecho. Las normas jurídicas son las que están en los códigos, leyes y sentencias: emanan de autoridad con facultad para dictarlas, regulan la convivencia y están respaldadas por la sanción coactiva."},
{topic:"Estructura Lógica de Normas",q:"Kelsen propone la estructura bifásica de la norma jurídica: norma primaria y norma secundaria. ¿Qué describe cada una y cuál tiene mayor importancia para Kelsen?",correct:"La norma primaria describe en su antecedente una conducta ilícita y establece la consecuencia coactiva (sanción); la norma secundaria describe la conducta lícita y el efecto jurídico sin sanción. Kelsen da más importancia a la primaria porque la secundaria está implícita en ella",wrong:["La norma primaria es la Constitución; la norma secundaria es la ley ordinaria; ambas tienen la misma importancia en el sistema kelseniano","La norma primaria establece derechos; la norma secundaria establece obligaciones; Kelsen prioriza la secundaria porque protege al individuo","La norma primaria es la que crea el Estado; la norma secundaria es la que crean los particulares en sus actos jurídicos"],why:"Para Kelsen, la norma primaria tiene en su antecedente la conducta ilícita y en su consecuente la sanción coactiva (ej: 'dado el homicidio, debe ser la reclusión'). La norma secundaria tiene la conducta lícita y el efecto jurídico sin sanción (ej: 'dado el contrato de préstamo, debe ser la devolución'). Kelsen prioriza la primaria porque la secundaria está implícita en ella y es superflua: lo esencial es la sanción coactiva."},
{topic:"Estructura Lógica de Normas",q:"Cossío critica a Kelsen por subestimar las normas secundarias y cambia la nomenclatura. ¿Cuál es el argumento de Cossío y cómo reformula la estructura?",correct:"Cossío sostiene que la endonorma (=norma secundaria de Kelsen) tiene mayor importancia porque describe conductas lícitas, que son lo normal en la vida social; la perinorma (=norma primaria) describe conductas ilícitas, que son la excepción. La estructura es un juicio disyuntivo: 'dado A debe ser P, O dado No-P debe ser S'",wrong:["Cossío rechaza la distinción de Kelsen porque considera que todas las normas son igualmente primarias y ninguna es secundaria","Cossío sostiene que la perinorma es la más importante porque sin sanción no hay norma jurídica, siguiendo a Kelsen en este punto","Cossío propone que la norma jurídica es un juicio categórico, reviviendo la teoría tradicional que Kelsen había rechazado"],why:"Cossío critica a Kelsen por no valorar las normas secundarias. La endonorma (norma secundaria kelseniana) describe conductas lícitas, que es lo normal: la inmensa mayoría de las personas ajusta su conducta al Derecho. La perinorma (norma primaria kelseniana) describe conductas ilícitas, que son la excepción. La estructura es disyuntiva: dado A debe ser P (endonorma), O dado No-P debe ser S (perinorma), enlazadas por 'o'."},
{topic:"Estructura Lógica de Normas",q:"Hart propone una distinción entre reglas primarias y secundarias diferente a la de Kelsen. ¿Cuál es la diferencia conceptual?",correct:"Para Hart, las reglas primarias imponen obligaciones a los individuos; las secundarias no se ocupan directamente de lo que los individuos deben hacer, sino que confieren potestades (para crear, modificar o aplicar las reglas primarias)",wrong:["Para Hart, las reglas primarias son las constitucionales; las secundarias son las leyes ordinarias","Para Hart, las reglas primarias son las normas morales que el Derecho recoge; las secundarias son las puramente técnicas","Para Hart, las reglas primarias y secundarias coinciden exactamente con la distinción de Kelsen entre norma primaria y secundaria"],why:"La diferencia con Kelsen es relevante: para Kelsen, la norma primaria es la que establece la sanción coactiva; la secundaria establece la conducta lícita. Para Hart, las reglas primarias imponen obligaciones; las secundarias (reglas de reconocimiento, cambio y adjudicación) no imponen directamente obligaciones sino que confieren potestades para identificar, crear y aplicar las reglas primarias."},
{topic:"Estructura Lógica de Normas",q:"Las tres reglas secundarias de Hart (reconocimiento, cambio y adjudicación) cumplen funciones distintas. ¿Qué función específica cumple la regla de reconocimiento?",correct:"Sirve para identificar qué normas forman parte de un determinado ordenamiento jurídico y cuáles no; en Chile, el Art. 7 del Código Civil (publicación en el Diario Oficial) es una regla de reconocimiento",wrong:["Sirve para determinar cuándo una norma puede ser modificada y cuál es el procedimiento para hacerlo","Sirve para establecer qué jueces son competentes para aplicar las normas primarias del ordenamiento","Sirve para reconocer los derechos fundamentales de los individuos que no pueden ser vulnerados por el Estado"],why:"La regla de reconocimiento identifica qué normas pertenecen a un ordenamiento jurídico. El Art. 7 del CC chileno (que señala que las leyes deben publicarse en el Diario Oficial) es un ejemplo: sirve para identificar qué normas son leyes chilenas. Sin ella, habría inseguridad sobre cuáles normas son Derecho y cuáles no."},
{topic:"Estructura Lógica de Normas",q:"Hart sostiene que el Derecho 'consiste en la unión de reglas primarias y secundarias'. ¿Por qué considera que un sistema compuesto solo de reglas primarias sería deficiente?",correct:"Porque sin reglas secundarias faltaría: (1) certeza sobre qué normas pertenecen al sistema (necesidad de regla de reconocimiento), (2) dinamismo para modificarlas (necesidad de reglas de cambio), y (3) determinación de cuándo se infringieron (necesidad de reglas de adjudicación)",wrong:["Porque sin reglas secundarias el sistema solo podría regular conductas privadas pero no actos del Estado","Porque sin reglas secundarias los jueces podrían crear libremente normas primarias sin límite alguno","Porque sin reglas secundarias solo existirían normas morales, haciéndose imposible distinguir el Derecho de la Moral"],why:"Hart argumenta que un sistema de solo reglas primarias adolecería de tres deficiencias: falta de certeza (sin saber cuáles normas son Derecho: necesidad de regla de reconocimiento), falta de dinamismo (sin poder modificar normas: necesidad de reglas de cambio), y falta de eficiencia (sin determinar cuándo se violaron normas: necesidad de reglas de adjudicación)."},

// ── PREGUNTAS INTEGRADORAS ───────────────────────────────────────────────────
{topic:"Integración de Conceptos",q:"¿Cómo se relaciona el principio de imputación de Kelsen con la distinción entre normas de conducta y leyes naturales?",correct:"El principio de imputación expresa la lógica del deber ser propia de las normas: vincula conducta antecedente con consecuencia que debe atribuírsele, sin necesidad causal. Las leyes naturales operan bajo el principio de causalidad: dado el antecedente, la consecuencia se produce necesariamente",wrong:["El principio de imputación de Kelsen reemplaza la causalidad en las ciencias naturales, haciendo que las leyes naturales sean también normativas","La imputación y la causalidad son equivalentes en el pensamiento de Kelsen: ambas vinculan antecedente y consecuente de manera necesaria","El principio de imputación de Kelsen solo aplica a las normas morales; las normas jurídicas se rigen por el principio de causalidad"],why:"La conexión es directa: las leyes naturales operan bajo el principio de causalidad (dado A, necesariamente sigue B). Las normas jurídicas operan bajo el principio de imputación (dado A, debe ser B, pero puede no serlo en los hechos). Esta distinción entre ser (causalidad) y deber ser (imputación) es el fundamento de la separación entre leyes naturales y normas de conducta."},
{topic:"Integración de Conceptos",q:"¿Cómo se vincula la autotutela como forma primitiva de resolución de conflictos con el concepto de coercibilidad de las normas jurídicas?",correct:"La autotutela es el uso de la fuerza privada por las partes en disputa; la coercibilidad es la posibilidad de usar la fuerza socialmente organizada (ordenada por los tribunales y ejecutada por la fuerza pública). El Derecho reemplaza la autotutela porque institucionaliza y legitima el uso de la fuerza",wrong:["La autotutela y la coercibilidad son equivalentes: ambas implican el uso legítimo de la fuerza para resolver conflictos","La coercibilidad elimina completamente la autotutela en los ordenamientos modernos, prohibiéndola en todos los casos","La autotutela es una forma de coercibilidad reconocida por el Derecho en casos excepcionales como la legítima defensa"],why:"La autotutela es el uso de la fuerza privada por los propios involucrados en el conflicto (forma primitiva). La coercibilidad de las normas jurídicas institucionaliza el uso de la fuerza: ya no la ejercen las partes sino la fuerza pública, ordenada por los tribunales. El Derecho reemplaza la autotutela porque legitima, organiza y monopoliza el uso de la fuerza como instrumento de solución de conflictos."},
{topic:"Integración de Conceptos",q:"La excepción de cosa juzgada requiere 'triple identidad': identidad legal de personas, de cosa pedida y de causa de pedir. ¿Por qué estos tres requisitos son copulativos y no alternativos?",correct:"Porque si falta cualquiera de los tres, el asunto que se demanda es sustancialmente distinto del ya fallado y no existe razón para impedir que sea conocido nuevamente; la excepción busca que no se juzgue dos veces exactamente el mismo conflicto",wrong:["Porque la ley procesal chilena optó por exigir los tres requisitos por razones históricas romanas, sin justificación lógica especial","Porque la identidad legal de personas es el único requisito realmente relevante; los otros dos son redundantes en la práctica","Porque los tres requisitos son alternativos: basta con uno de ellos para que proceda la excepción de cosa juzgada"],why:"Son copulativos porque la cosa juzgada busca impedir que se juzgue nuevamente exactamente el mismo conflicto. Si falta la identidad de personas, las partes son distintas. Si falta la identidad de cosa pedida, el beneficio jurídico reclamado es diferente. Si falta la identidad de causa de pedir, el fundamento jurídico del derecho es distinto. En cualquiera de estos casos, existe una razón suficiente para que el asunto sea conocido nuevamente."},
{topic:"Integración de Conceptos",q:"¿Por qué la objeción de conciencia constituye una excepción a la heteronomía de las normas jurídicas y no una negación de su coercibilidad?",correct:"Porque la objeción de conciencia es la posibilidad de negarse a realizar un acto considerado inmoral sin incurrir en las sanciones del ordenamiento; no elimina la coercibilidad de la norma (que sigue siendo posible) sino que reconoce una excepción al deber de obedecerla basada en la autonomía moral del sujeto",wrong:["Porque la objeción de conciencia elimina la coacción pero mantiene la coercibilidad: la fuerza puede ejercerse pero no se ejerce","Porque la objeción de conciencia convierte a la norma jurídica en norma moral, cambiando su naturaleza de coercible a incoercible","Porque la objeción de conciencia es una forma de autotutela jurídicamente reconocida que permite usar la fuerza privada"],why:"La objeción de conciencia es una excepción a la heteronomía (no a la coercibilidad) porque reconoce que, en ciertos casos, la autonomía moral del sujeto se impone sobre la norma heterónoma. El ordenamiento jurídico acepta que el sujeto se niegue a cumplir ciertos deberes sin incurrir en sanciones. La norma sigue siendo coercible en general, pero se reconoce una excepción basada en el fuero interno del sujeto."},
{topic:"Integración de Conceptos",q:"Un alumno sostiene que el 'error de prohibición' demuestra que el principio de conocimiento de la ley no tiene excepciones reales. ¿Es correcto ese argumento?",correct:"No es correcto: el error de prohibición es precisamente una excepción al principio de que nadie puede alegar ignorancia de la ley, ya que en Derecho Penal se acepta que el desconocimiento de la ilicitud de la conducta puede excluir o atenuar la responsabilidad del sujeto",wrong:["Es correcto: el error de prohibición no es una excepción sino una confirmación del principio, pues quien lo alega igual es sancionado","Es correcto: el error de prohibición solo aplica en el Derecho Privado y no en el Penal donde rige plenamente el principio","Es correcto: el error de prohibición es un error de hecho, no de derecho, por lo que no afecta al principio de conocimiento de la ley"],why:"El error de prohibición es precisamente una excepción al Art. 8 del CC. En Derecho Penal se acepta que quien actúa sin conocer que su conducta es contraria a Derecho (ignorando la ilicitud) puede quedar exento o tener atenuada su responsabilidad. Esto atenúa el absolutismo del principio de conocimiento del Derecho, mostrando que no es tan categórico como parece."},
{topic:"Integración de Conceptos",q:"¿Cómo se relaciona la distinción entre ser/deber ser con la diferencia entre función descriptiva y función directiva (prescriptiva) del lenguaje?",correct:"El ámbito del ser corresponde al lenguaje descriptivo: sus expresiones describen hechos y pueden ser verdaderas o falsas. El ámbito del deber ser corresponde al lenguaje prescriptivo: sus expresiones (las normas) no describen sino que prescriben conductas, y no se califican de verdaderas o falsas sino de justas/injustas o válidas/inválidas",wrong:["El ámbito del ser corresponde al lenguaje directivo; el del deber ser al lenguaje expresivo, porque las normas expresan la voluntad del legislador","La distinción ser/deber ser no tiene relación con las funciones del lenguaje: son categorías lógicas independientes entre sí","El ámbito del ser corresponde al lenguaje operativo; el del deber ser al descriptivo, porque las normas describen el comportamiento esperado"],why:"La conexión es directa y fundamental: las leyes naturales pertenecen al ámbito del ser y al lenguaje descriptivo (describen relaciones constantes entre fenómenos, pueden ser verdaderas o falsas). Las normas de conducta pertenecen al ámbito del deber ser y al lenguaje prescriptivo (no describen, sino que prescriben conductas; no se califican de verdaderas o falsas sino de válidas/inválidas, justas/injustas, eficaces/ineficaces)."},
{"topic":"Lenguaje Jur\u00EDdico","q":"\u00BFCu\u00E1l es el problema espec\u00EDfico de vaguedad que presenta la palabra Derecho, a diferencia de su ambig\u00FCedad?","correct":"Que se sabe a qu\u00E9 se refiere en general, pero su significado no est\u00E1 delimitado con exactitud porque cada autor lo define desde su propio punto de vista: social, l\u00F3gico, \u00E9tico, religioso, etc.","wrong":["Que la palabra Derecho carece completamente de significado y por eso no puede ser definida por ning\u00FAn autor","Que tiene tantos significados que resulta imposible escoger uno solo como correcto","Que la vaguedad se origina exclusivamente en las diferencias entre sistemas jur\u00EDdicos de distintos pa\u00EDses"],"why":"La vaguedad del Derecho no proviene de que no se sepa a qu\u00E9 se refiere, sino de que su significado no est\u00E1 delimitado con exactitud. Cada autor lo define seg\u00FAn su propio punto de vista (social, l\u00F3gico, \u00E9tico, religioso), lo que imprecisa su contorno definitivo."},
{"topic":"Significados del Derecho","q":"Cuando se usa 'derecho' para designar un tributo aduanero, \u00BFen qu\u00E9 sentido se emplea la palabra?","correct":"En una acepci\u00F3n adicional dentro del campo jur\u00EDdico distinta de los significados principales: se usa para designar un impuesto o pago exigido por el Estado","wrong":["En el sentido de Derecho subjetivo: la facultad del Estado para cobrar al importador","En el sentido de Derecho objetivo: el conjunto de normas aduaneras que regulan la importaci\u00F3n","En el sentido de justicia: que el cobro de ese monto es lo correcto para el comercio exterior"],"why":"El uso de 'derecho' como sin\u00F3nimo de impuesto es una acepci\u00F3n adicional que no coincide con los significados principales (objetivo, subjetivo, ordenamiento, justicia, ciencia). Ilustra la polisemia del t\u00E9rmino Derecho incluso dentro del lenguaje jur\u00EDdico especializado."},
{"topic":"Seguridad Jur\u00EDdica","q":"La prescripci\u00F3n (Art. 2492 CC) refleja la seguridad jur\u00EDdica. \u00BFPor qu\u00E9 tanto la prescripci\u00F3n adquisitiva como la extintiva expresan ese valor?","correct":"Porque consolidan situaciones jur\u00EDdicas estables en el tiempo: la adquisitiva permite adquirir derechos por la posesi\u00F3n prolongada y la extintiva extingue acciones no ejercidas, dando certeza al ordenamiento","wrong":["Porque la prescripci\u00F3n garantiza siempre la justicia: el poseedor que prescribe adquiere lo que moralmente le correspond\u00EDa","Porque permite al Estado recuperar bienes acumulados injustamente durante mucho tiempo","Porque es la herramienta principal de los tribunales para resolver conflictos de propiedad"],"why":"La prescripci\u00F3n expresa la seguridad jur\u00EDdica porque consolida situaciones estables en el tiempo. La adquisitiva permite que quien ha pose\u00EDdo durante cierto lapso adquiera el dominio; la extintiva elimina acciones y derechos no ejercidos. Ambas dan certeza al ordenamiento, aunque no siempre coincidan con la justicia en el caso concreto."},
{"topic":"Persona Humana","q":"El entendimiento humano puede conocer la esencia de las cosas. \u00BFCu\u00E1l es la distinci\u00F3n entre su capacidad y su virtud operativa?","correct":"La capacidad es que puede comprender toda clase de seres y fen\u00F3menos haciendo abstracci\u00F3n de lo particular; la virtud operativa tiene l\u00EDmites: ning\u00FAn entendimiento creado abarca todo lo existente","wrong":["El entendimiento humano es omnisciente en potencia, pudiendo conocer todo si se le da suficiente tiempo","Solo puede conocer objetos materiales; los objetos espirituales le son inaccesibles por naturaleza","El entendimiento humano y los sentidos son equivalentes: tienen el mismo alcance en el conocimiento"],"why":"Los apuntes distinguen capacidad y virtud operativa del entendimiento: aunque puede comprender toda clase de seres (hace abstracci\u00F3n de lo particular y conoce la esencia), ning\u00FAn entendimiento creado abarca todo lo existente, por lo que no est\u00E1 a nuestro alcance entender todo cuanto hay."},
{"topic":"Hombre y Sociedad","q":"La transacci\u00F3n (Art. 2446 CC) es una forma de autocomposici\u00F3n. \u00BFC\u00F3mo la define el C\u00F3digo Civil y cu\u00E1l es su rasgo definitorio?","correct":"Es un contrato en que las partes terminan extrajudicialmente un litigio pendiente o precaven un litigio eventual; su rasgo definitorio es que el acuerdo entre las partes resuelve el conflicto sin que un tercero imponga la decisi\u00F3n","wrong":["Es una resoluci\u00F3n judicial en que el juez propone una soluci\u00F3n y las partes la aceptan libremente","Es un acuerdo en que una parte reconoce su responsabilidad y paga una indemnizaci\u00F3n fijada por el tribunal","Es una forma de proceso simplificado donde las partes someten el conflicto a un \u00E1rbitro p\u00FAblico"],"why":"El Art. 2446 CC define la transacci\u00F3n como un contrato en que las partes terminan extrajudicialmente un litigio pendiente o precaven uno eventual. Como autocomposici\u00F3n, su rasgo definitorio es que las propias partes resuelven el conflicto mediante acuerdo, sin que un tercero imponga la decisi\u00F3n."},
{"topic":"Criterios de Diferenciaci\u00F3n","q":"La costumbre jur\u00EDdica tiene elemento objetivo y subjetivo. \u00BFEn qu\u00E9 consiste cada uno y qu\u00E9 implican para la heteronomia de las normas consuetudinarias?","correct":"El objetivo es la repetici\u00F3n constante y uniforme de la conducta por la comunidad; el subjetivo es la convicci\u00F3n de que es jur\u00EDdicamente obligatoria (opinio iuris). Al ser creada por los propios sujetos obligados, la costumbre tiene menor grado de heteronomia","wrong":["El objetivo es la aprobaci\u00F3n por el legislador; el subjetivo es la aceptaci\u00F3n del ciudadano; por eso la costumbre es completamente aut\u00F3noma","El objetivo es la existencia de un texto escrito que la recoja; el subjetivo es la opini\u00F3n del juez sobre su obligatoriedad","El objetivo es el tiempo de vigencia (al menos 10 a\u00F1os); el subjetivo es la uniformidad de su aplicaci\u00F3n en el territorio"],"why":"La costumbre tiene: elemento objetivo (repetici\u00F3n constante y uniforme de la conducta) y subjetivo (convicci\u00F3n de que es jur\u00EDdicamente obligatoria: opinio iuris). Al ser creada por los propios sujetos que deben obedecerla, pierde grados de heteronomia y asume grados de autonom\u00EDa, a diferencia de la ley dictada por autoridad externa."},
{"topic":"Estructura L\u00F3gica de Normas","q":"\u00BFCu\u00E1l es la caracter\u00EDstica exclusiva del lenguaje descriptivo que lo distingue de todas las dem\u00E1s funciones del lenguaje?","correct":"Las expresiones del lenguaje descriptivo son las \u00FAnicas que pueden ser calificadas de verdaderas o falsas; las dem\u00E1s funciones admiten otros calificativos (justas/injustas, apropiadas/inapropiadas, etc.)","wrong":["El lenguaje descriptivo es el \u00FAnico que puede influir en la conducta de otros de manera efectiva","Es el \u00FAnico propio de la ciencia; las dem\u00E1s funciones pertenecen solo al lenguaje coloquial","Es el \u00FAnico que puede expresar emociones del hablante de manera objetiva y verificable"],"why":"La caracter\u00EDstica exclusiva del lenguaje descriptivo es que sus expresiones pueden ser verdaderas o falsas (cuando coinciden o no con la realidad). Las dem\u00E1s funciones no admiten esta calificaci\u00F3n: una orden puede ser justa o injusta, pero no 'verdadera o falsa' en el sentido l\u00F3gico."},
{"topic":"Tipos de Normas","q":"Las normas de trato social son extremadamente variables en el tiempo y en el espacio. \u00BFCu\u00E1l es la causa principal de esa variabilidad?","correct":"Que est\u00E1n estrechamente ligadas a las costumbres sociales, que cambian seg\u00FAn el tiempo y la cultura; lo que antes era cortesía puede ya no serlo hoy, y lo adecuado en una cultura puede no serlo en otra","wrong":["Son creadas por el Estado, que las modifica seg\u00FAn las necesidades pol\u00EDticas del momento","Su sanci\u00F3n (el rechazo social) es muy d\u00E9bil, lo que hace que las personas las incumplan frecuentemente cambiando la norma","Son normas bilaterales: al cambiar las relaciones entre partes, cambian tambi\u00E9n las normas que las regulan"],"why":"Las normas de trato social est\u00E1n muy ligadas a las costumbres sociales, variables en el tiempo y en el espacio. Ej: antes existia la norma de pintar fachadas para el 18 de septiembre; hoy ya no se mira como incorrecto no hacerlo. Lo adecuado en una cultura puede no serlo en otra."}
];

function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}return arr;}

var Q=shuffle(BASE.map(function(b){var opts=shuffle([b.correct,b.wrong[0],b.wrong[1],b.wrong[2]]);return{topic:b.topic,q:b.q,opts:opts,ans:opts.indexOf(b.correct),why:b.why};}));

var current=0,score=0,answered=[];
for(var i=0;i<Q.length;i++)answered.push(null);

function render(){
  if(current>=Q.length){showResult();return;}
  var q=Q[current];
  document.getElementById('pbar').style.width=Math.round((current/Q.length)*100)+'%';
  var isAns=answered[current]!==null;
  var html='<div class="question-card"><div class="q-meta"><span class="topic-badge">'+q.topic+'</span><span class="counter">Pregunta '+(current+1)+' de '+Q.length+'</span></div><p class="q-text">'+q.q+'</p>';
  for(var i=0;i<q.opts.length;i++){
    var cls='';
    if(isAns){if(i===q.ans)cls='correct';else if(i===answered[current]&&i!==q.ans)cls='wrong';}
    html+='<button class="option '+cls+'" '+(isAns?'disabled':'')+' onclick="choose('+i+')">'+String.fromCharCode(65+i)+') '+q.opts[i]+'</button>';
  }
  var fbcls=isAns?(answered[current]===q.ans?'ok':'ko'):'';
  var fbshow=isAns?'show':'';
  var fbtext=isAns?((answered[current]===q.ans?'\u2713 Correcto. ':'\u2717 Incorrecto. ')+q.why):'';
  html+='<div class="feedback '+fbshow+' '+fbcls+'">'+fbtext+'</div></div>';
  var resp=0;for(var j=0;j<answered.length;j++){if(answered[j]!==null)resp++;}
  html+='<div class="nav-row"><button class="btn" onclick="go(-1)" '+(current===0?'disabled':'')+'>&#8592; Anterior</button><span class="counter">'+score+' correctas de '+resp+' respondidas</span>';
  if(current<Q.length-1)html+='<button class="btn primary" onclick="go(1)">Siguiente &#8594;</button>';
  else html+='<button class="btn primary" onclick="current=Q.length;render()">Ver resultado</button>';
  html+='</div>';
  document.getElementById('content').innerHTML=html;
}

function choose(i){if(answered[current]!==null)return;answered[current]=i;if(i===Q[current].ans)score++;render();}
function go(dir){current+=dir;render();}

function showResult(){
  document.getElementById('pbar').style.width='100%';
  var pct=Math.round((score/Q.length)*100);
  var msg=pct>=90?'Excelente dominio del material':pct>=70?'Buen resultado, sigue repasando':pct>=50?'Vas bien, pero hay temas por reforzar':'Conviene repasar los apuntes con detalle';
  var dots='';for(var i=0;i<answered.length;i++){dots+='<div class="dot" title="P.'+(i+1)+': '+(answered[i]===Q[i].ans?'Correcta':'Incorrecta')+'" style="background:'+(answered[i]===Q[i].ans?'#639922':'#A32D2D')+'"></div>';}
  document.getElementById('content').innerHTML='<div class="question-card score-card"><div class="score-num">'+score+'/'+Q.length+'</div><div class="score-label">'+pct+'% &mdash; '+msg+'</div><div class="dots">'+dots+'</div><p style="font-size:12px;color:#999;margin-top:10px;">Verde = correcta &nbsp;&middot;&nbsp; Rojo = incorrecta</p></div><div class="nav-row" style="justify-content:center;"><button class="btn primary" onclick="location.reload()">Reiniciar con nuevo orden aleatorio</button></div>';
}

render();
</script>
</body>
</html>
