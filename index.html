<script>
var BASE=[
{topic:"Derecho Político",q:"Verdugo define el Derecho Político como la disciplina que procura conocer el funcionamiento real de las instituciones jurídico-políticas. ¿Qué implica este énfasis en lo real?",correct:"Que el Derecho Político no se limita a las normas escritas, sino que estudia cómo funcionan efectivamente las instituciones en la práctica",wrong:["Que el Derecho Político se ocupa solo de los hechos históricos verificables, sin referencia a normas","Que las normas constitucionales carecen de valor si no coinciden con la realidad política","Que el Derecho Político es una disciplina sociológica y no jurídica"],why:"El énfasis en lo real distingue al Derecho Político del Derecho Constitucional: no se conforma con analizar el texto normativo, sino que indaga cómo operan efectivamente las instituciones en la práctica política."},
{topic:"Derecho Político",q:"Un estudiante sostiene que Derecho Político y Derecho Constitucional son equivalentes porque ambos estudian la Constitución. ¿Qué respuesta refleja mejor la distinción de los apuntes?",correct:"Es incorrecto: el Derecho Constitucional se enfoca en las normas escritas de la Constitución, mientras que el Derecho Político es más amplio y estudia la realidad política que subyace a esos textos",wrong:["Es correcto: ambos analizan las normas constitucionales, aunque con distintos métodos formales","Es incorrecto: el Derecho Constitucional es más amplio porque abarca también el derecho administrativo","Es correcto: la única diferencia es que el Derecho Político es más reciente como disciplina"],why:"Los apuntes son explícitos: el Derecho Político es más amplio porque estudia la realidad política detrás de los textos, mientras que el Derecho Constitucional se enfoca en las normas escritas de la Constitución."},
{topic:"Derecho Político",q:"En sentido estricto, ¿qué actividades abarca el concepto de 'lo político' según los apuntes?",correct:"Las actividades relacionadas con el Estado y el ámbito de lo público, incluyendo la conquista del poder y su ejercicio orientado al bien común",wrong:["Toda actividad humana dirigida al logro de cualquier objetivo colectivo, sin importar si involucra al Estado","Exclusivamente las actividades electorales y de representación parlamentaria","Solo la actividad legislativa del Estado, excluyendo la ejecutiva y la judicial"],why:"En sentido estricto, lo político refiere a la actividad relacionada con el Estado y el ámbito de lo público. Coexisten tres definiciones complementarias: lo que dimana del Estado, lo que ejerce el poder estatal en procura del bien común, y lo que procura obtener, retener o ejecutar el poder."},
{topic:"El Hombre como Ser Social",q:"Verdugo sostiene que el hombre no existe, sino que coexiste. ¿Cuál de las siguientes afirmaciones es consecuente con esta idea?",correct:"La existencia humana es constitutivamente relacional: no hay una etapa previa a la sociedad en que el hombre sea plenamente humano en soledad",wrong:["El hombre prefiere la vida social, pero podría desarrollarse plenamente en aislamiento si lo eligiera libremente","La coexistencia es un hecho empírico, no una necesidad de la naturaleza humana","El ser humano coexiste con otros solo en la medida en que lo exige la satisfacción de necesidades materiales"],why:"La fórmula de Verdugo implica que la socialidad es constitutiva del ser humano: no es una característica accidental o electiva, sino que define su modo de existir. Vivir humanamente es vivir con otros."},
{topic:"El Hombre como Ser Social",q:"¿Qué tensión fundamental identifica Verdugo en la naturaleza humana y qué consecuencia institucional tiene?",correct:"La tensión entre el impulso social y la naturaleza antisocial del hombre; esa tensión impulsa la creación de instituciones para regular la convivencia",wrong:["La tensión entre razón e instinto; esa tensión produce el lenguaje como mecanismo de comunicación","La tensión entre libertad e igualdad; esa tensión produce el Estado como árbitro neutro","La tensión entre individuo y comunidad, que se resuelve con la supresión del libre albedrío en sociedad"],why:"Junto al impulso social del hombre existe también una naturaleza antisocial. Esta tensión es precisamente lo que impulsa la creación de instituciones, que son el mecanismo mediante el cual la convivencia se organiza y regula."},
{topic:"El Hombre como Ser Social",q:"Fernández afirma que lo social es para el hombre ayuda necesaria y, al mismo tiempo, límite y barrera. ¿Qué expresa con precisión esta paradoja?",correct:"Que la sociedad es al mismo tiempo condición de posibilidad del desarrollo humano y restricción de la libertad individual, sin que ninguno de los dos aspectos pueda eliminarse",wrong:["Que la sociedad beneficia al individuo solo económicamente, pero le impone restricciones morales innecesarias","Que el hombre necesita la sociedad únicamente en su infancia, pero puede prescindir de ella en la madurez","Que la dimensión social es una carga que el hombre soporta a cambio de seguridad física"],why:"La paradoja de Fernández capta la doble dimensión irreductible de lo social: es ayuda necesaria porque sin ella el hombre no puede desarrollarse plenamente, pero es también límite y barrera porque regula y restringe la libertad individual."},
{topic:"Concepciones de la Sociedad",q:"La concepción mecánica tiene antecedentes en Hobbes, Locke y Rousseau. ¿Qué rasgo comparten que justifica su inclusión en esa corriente?",correct:"Los tres parten del individuo como unidad básica y explican la sociedad como resultado de un contrato entre individuos preexistentes, no como una realidad originaria",wrong:["Los tres defienden que la sociedad debe estar dirigida por una élite ilustrada que representa el bien común","Los tres rechazan la idea de derechos naturales individuales y privilegian los deberes colectivos","Los tres sostienen que el Estado es la expresión más perfecta de la voluntad divina"],why:"Hobbes, Locke y Rousseau comparten el punto de partida individualista: la sociedad no es un dato originario, sino el resultado de una decisión o contrato entre individuos que preceden lógicamente a la comunidad. Esto es el núcleo de la concepción mecánica o atomista."},
{topic:"Concepciones de la Sociedad",q:"¿Por qué la concepción orgánica de la sociedad tiende a conjugarse con tendencias totalitarias?",correct:"Porque al concebir la sociedad como una unidad con vida propia superior a los individuos, puede justificar la subordinación total del individuo a los fines colectivos, suprimiendo el libre albedrío",wrong:["Porque sus principales representantes (Hegel, Comte, Spencer) fundaron partidos políticos totalitarios","Porque la visión biológica de la sociedad conduce a la selección de razas más aptas","Porque el organicismo exige un Estado mínimo que concentra el poder en pocas manos"],why:"Si la sociedad es una unidad originaria con vida propia superior a los individuos, la lógica puede llevar a subordinar completamente al individuo a los fines de ese todo. Eso abre la puerta a regímenes totalitarios que niegan la autonomía individual en nombre del bien colectivo."},
{topic:"Concepciones de la Sociedad",q:"La concepción orgánica presenta dos variantes. ¿En qué se diferencian la biológica y la espiritualista?",correct:"La biológica sostiene que la sociedad posee órganos, células y sistema nervioso; la espiritualista sostiene que posee conciencia colectiva y voluntad independiente",wrong:["La biológica defiende que solo los cuerpos físicos forman la sociedad; la espiritualista que solo las almas la constituyen","La biológica es propia de Hegel y la espiritualista de Spencer, con posiciones políticas opuestas","La biológica rechaza la existencia del Estado; la espiritualista lo considera el único sujeto de derechos"],why:"Dentro de la concepción orgánica coexisten dos versiones: la biológica, que aplica la metáfora del organismo vivo (órganos, células, sistema nervioso), y la espiritualista, que atribuye a la sociedad conciencia colectiva y voluntad independiente de los individuos."},
{topic:"Concepciones de la Sociedad",q:"La posición ecléctica de Verdugo combina elementos de la concepción biológica y la mecanicista. ¿Qué toma de cada una?",correct:"De la biológica toma que la sociedad es exigencia de la naturaleza del hombre; de la mecanicista toma que en la sociedad no se anula el libre albedrío individual",wrong:["De la biológica toma que la sociedad tiene órganos y sistema nervioso; de la mecanicista toma que el Estado es solo un árbitro entre individuos","De ambas toma la idea de que la sociedad puede cambiar; rechaza que el individuo tenga derechos anteriores a la comunidad","De la biológica toma que la sociedad muere como los organismos; de la mecanicista toma que el contrato es el fundamento del Estado"],why:"Verdugo adopta una posición ecléctica: de la concepción biológica acepta que la sociedad es una exigencia de la naturaleza humana (no un mero acuerdo artificial), y de la mecanicista que el libre albedrío individual no se suprime en sociedad."},
{topic:"Diferencias Humanas y Animales",q:"Aristóteles distingue la sociedad humana de la animal por el uso del lenguaje. ¿Cuál es la diferencia precisa, más allá de que los animales también se comunican?",correct:"Los animales solo perciben el placer y el dolor, mientras que el hombre comunica nociones como lo justo, lo injusto, lo bueno y lo malo, lo que funda la comunidad política propiamente humana",wrong:["Los animales se comunican mediante señales físicas; el hombre lo hace mediante escritura y tecnología","Los animales forman sociedades fijas e inamovibles; el hombre las transforma tecnológicamente","Los animales tienen comunicación unidireccional; el hombre tiene comunicación bidireccional y recíproca"],why:"La diferencia aristotélica no es simplemente tener lenguaje articulado, sino que el hombre usa ese lenguaje para comunicar conceptos éticos y políticos: lo justo, lo injusto, lo bueno y lo malo. Los demás animales solo perciben el placer y el dolor."},
{topic:"Diferencias Humanas y Animales",q:"¿Por qué la colmena es un ejemplo de lo que la sociedad humana NO es, según los apuntes?",correct:"Porque la colmena es esencial y estructuralmente la misma siempre; la sociedad humana, en cambio, transforma permanentemente sus instituciones y crea nuevos recursos técnicos ante los cambios",wrong:["Porque la colmena carece de jerarquía interna, mientras que la sociedad humana siempre tiene gobernantes","Porque las abejas no tienen lenguaje; en lo demás, colmena y sociedad humana son similares","Porque la colmena actúa por unanimidad instintiva, mientras que la sociedad humana actúa por votación mayoritaria"],why:"Los apuntes usan la colmena como contraejemplo: es esencial y estructuralmente la misma siempre. La sociedad humana, frente a los cambios, inventa recursos técnicos y crea nuevas instituciones; el hombre se readapta en su propia estructura, lo que la abeja nunca hace."},
{topic:"Las Instituciones",q:"Los apuntes indican que las instituciones deben satisfacer necesidades sociales éticas. ¿Qué agrega el adjetivo éticas a la definición?",correct:"Que no cualquier necesidad justifica una institución: debe tratarse de necesidades que importen valores éticos; una organización orientada a fines inmorales no cumple el concepto",wrong:["Que las instituciones deben ser creadas por organismos especializados en ética y filosofía moral","Que las instituciones solo pueden ser religiosas o morales, excluyendo las de tipo económico o técnico","Que las instituciones deben ser evaluadas por comités de ética independientes del Estado"],why:"El adjetivo éticas es fundamental porque no toda necesidad social justifica una institución en sentido estricto. Las instituciones procuran satisfacer necesidades que importan valores éticos; una organización orientada a fines inmorales no es una institución en el sentido de los apuntes."},
{topic:"Las Instituciones",q:"¿Por qué una biblioteca creada por decreto, pero sin sede, sin público y sin concurrencia, no es estrictamente una institución?",correct:"Porque le falta el elemento estructural real y la concurrencia social que le da vida: las instituciones requieren obrar humano efectivo y colectivo, no solo una declaración formal",wrong:["Porque las bibliotecas no pueden ser creadas por decreto, sino solo por iniciativa privada","Porque falta el elemento intelectual o de representación colectiva que legitima la institución","Porque no cuenta con el aval del Ministerio de Educación, que es quien valida las instituciones culturales"],why:"El ejemplo de los apuntes ilustra que la institución no es solo la norma que la crea (elemento formal), sino que requiere concurrencia real: sede, público, funcionamiento efectivo. Sin eso, es una declaración vacía, no una creación del obrar humano colectivo."},
{topic:"Las Instituciones",q:"Hauriou afirma que el alma de la institución es la idea. ¿Qué consecuencia práctica tiene esto para la relación entre elemento intelectual y estructural?",correct:"Ambos elementos son imprescindibles: sin la idea fundacional no se crea la institución, pero sin la estructura material tampoco puede subsistir; ninguno prevalece sobre el otro",wrong:["El elemento intelectual siempre prevalece: si la idea persiste, la institución existe aunque pierda toda su infraestructura material","El elemento estructural es meramente accesorio: lo único que importa es que la idea se mantenga viva en la conciencia colectiva","La idea fundacional puede modificarse libremente en cualquier momento sin afectar la identidad de la institución"],why:"Los apuntes son explícitos: ambos elementos son imprescindibles. Sin la idea fundacional no se crea la institución (el alma), pero sin la estructura material tampoco puede subsistir (el cuerpo). Sin la idea no se crea, pero sin la estructura tampoco se mantiene."},
{topic:"Las Instituciones",q:"El matrimonio es citado como ejemplo de institución social compleja. ¿Qué ilustra sobre el concepto de institución?",correct:"Que una institución puede tener una base natural o instintiva, pero al transformarse en vida en común permanente supera ese origen y se convierte en una realidad cultural compleja con sus propias reglas",wrong:["Que el matrimonio es la institución más importante porque tiene base en el derecho natural divino","Que las instituciones sociales deben estar siempre basadas en un instinto natural para ser legítimas","Que el matrimonio prueba que las instituciones solo pueden ser creadas por la religión o por el Estado"],why:"El ejemplo del matrimonio ilustra cómo una institución trasciende su base natural: aunque tiene como base el instinto sexual, al transformarse en vida en común permanente con cuidado de los hijos se convierte en mucho más: una institución social compleja con normas, roles y permanencia."},
{topic:"Las Instituciones",q:"Según George Renard, ¿cuál es el principio rector de la institución que la diferencia del contrato?",correct:"La idea de Autoridad, que implica diferenciación, jerarquía y subordinación del propósito individual a las aspiraciones colectivas; el contrato en cambio postula igualdad entre partes",wrong:["El consenso unánime de sus miembros, a diferencia del contrato que solo requiere acuerdo de voluntades","La permanencia en el tiempo, a diferencia del contrato que es siempre temporal","La creación estatal, a diferencia del contrato que puede ser puramente privado"],why:"Renard identifica como principio rector de la institución la idea de Autoridad: diferenciación, desigualdad, jerarquía y subordinación del propósito individual a las aspiraciones colectivas. El contrato, en cambio, postula igualdad entre partes y sirve a propósitos subjetivos individuales."},
{topic:"Tipos de Instituciones",q:"Los apuntes señalan que en las instituciones jurídicas la norma no es solo el elemento estructural: constituye su objeto específico y su realidad misma. ¿Qué significa esto?",correct:"Que a diferencia de otras instituciones donde la norma es parte del andamiaje formal, en las jurídicas la norma es la sustancia misma de la institución: sin ella no hay institución jurídica posible",wrong:["Que las instituciones jurídicas no necesitan infraestructura física porque la norma escrita lo reemplaza todo","Que las instituciones jurídicas son superiores a las políticas porque tienen base normativa más sólida","Que la norma jurídica y la institución jurídica son conceptos completamente intercambiables"],why:"Para las instituciones jurídicas, la norma no es simplemente uno de sus elementos formales, sino que constituye su objeto específico y su realidad misma. La institución jurídica existe en el mundo del Derecho precisamente a través de la norma."},
{topic:"Tipos de Instituciones",q:"¿Cuál de los siguientes ilustra correctamente la triple significación de las instituciones jurídicas aplicada al matrimonio?",correct:"Institución-cuerpo: la pareja de esposos como unidad real; institución-órgano: el rol de cada cónyuge; institución-norma: las disposiciones del Código Civil que regulan sus relaciones",wrong:["Institución-cuerpo: el contrato de matrimonio; institución-órgano: la ceremonia nupcial; institución-norma: la Iglesia que lo bendice","Institución-cuerpo: los hijos del matrimonio; institución-órgano: el patrimonio familiar; institución-norma: el registro civil","Institución-cuerpo: el amor entre los cónyuges; institución-órgano: los deberes mutuos; institución-norma: el divorcio como límite"],why:"Los apuntes explican que las instituciones jurídicas tienen triple significación: institución-cuerpo (el conjunto de personas como unidad real), institución-órgano (el rol de cada miembro), institución-norma (los preceptos jurídicos que la regulan). El matrimonio ilustra perfectamente las tres."},
{topic:"Tipos de Instituciones",q:"Lowestein define las instituciones políticas como el aparato a través del cual se ejerce el poder en el Estado. ¿Qué elemento clave la distingue de las instituciones jurídicas?",correct:"Su vinculación al poder estatal: las instituciones políticas se definen por su relación con la organización, evolución, ejercicio y legitimidad del poder; las jurídicas apuntan a realizar la justicia",wrong:["Que las instituciones políticas son siempre temporales y las jurídicas son permanentes","Que las instituciones políticas no tienen elemento normativo, a diferencia de las jurídicas","Que las instituciones políticas solo existen en regímenes democráticos, mientras que las jurídicas existen en todo sistema"],why:"La definición de Lowestein centra las instituciones políticas en su vinculación al poder estatal: son el aparato a través del cual se ejerce el poder. Las instituciones jurídicas se definen por su orientación hacia la realización de la justicia."},
{topic:"Instituciones y Cambio Social",q:"Hauriou distingue entre instituciones en trance de reforma e instituciones en trance de supresión. ¿Qué determina cuál de los dos caminos corresponde?",correct:"El grado de desajuste o corrupción: si la institución puede adaptarse a las nuevas necesidades mediante cambios internos sigue en pie reformada; si ha perdido completamente su razón de ser, corresponde suprimirla",wrong:["Lo determina exclusivamente el poder legislativo mediante una ley que declare la institución obsoleta","Lo determina el tiempo transcurrido desde su creación: las instituciones más antiguas se suprimen","Lo determina la opinión pública medida por encuestas periódicas sobre satisfacción institucional"],why:"Hauriou señala que cuando las instituciones dejan de responder a las necesidades o se corrompen, la confianza del público se aparta de ellas. Pueden sobrevivir por inercia, pero quedan en trance de reforma (si son recuperables) o de supresión (si han perdido toda utilidad)."},
{topic:"Instituciones y Cambio Social",q:"¿Cuál es la condición que hace legítimo el cambio institucional, según los apuntes?",correct:"Que el cambio se realice dentro de los cauces institucionales previstos, no al margen de ellos; el cambio es legítimo si respeta los procedimientos que la propia institucionalidad contempla para su modificación",wrong:["Que el cambio cuente con el apoyo de al menos dos tercios de la ciudadanía consultada en referéndum","Que el cambio sea aprobado por todas las instituciones involucradas de forma unánime","Que el cambio no afecte los elementos intelectuales de la institución, aunque modifique los estructurales"],why:"La clave es que el cambio debe realizarse dentro de los cauces institucionales previstos, no al margen de ellos. El cambio institucional es legítimo cuando respeta los procedimientos que la propia institucionalidad contempla para su modificación."},
{topic:"Dignidad Humana",q:"Nogueira sostiene que la dignidad es el mínimo invulnerable que ninguna reforma constitucional puede desconocer. ¿Qué implicancia tiene esto para el poder constituyente?",correct:"Que existe un límite sustancial al poder constituyente: aunque pueda reformar la Constitución, no puede hacerlo de modo que vulnere la dignidad humana, que opera como cláusula pétrea material",wrong:["Que el poder constituyente puede reformar cualquier norma, incluidas las de dignidad, si lo hace con el quórum adecuado","Que solo el Tribunal Constitucional puede determinar cuándo una reforma afecta la dignidad","Que la dignidad es un límite solo para el poder legislativo ordinario, pero no para el poder constituyente originario"],why:"La posición de Nogueira establece un límite material al poder constituyente: la dignidad es el mínimo invulnerable que ninguna reforma puede desconocer. Esto equivale a una cláusula pétrea implícita: ni siquiera el constituyente derivado puede suprimir o desnaturalizar la dignidad."},
{topic:"Dignidad Humana",q:"¿Por qué la concepción posicional de la dignidad es ajena al principio de igualdad?",correct:"Porque basa la dignidad en la posición social, filiación o cargo, lo que implica que distintas personas tienen distintas dignidades y no son iguales; esto es incompatible con la igualdad universal",wrong:["Porque la posición social varía según el esfuerzo individual, lo que hace imposible garantizar una igualdad estable","Porque la concepción posicional proviene de culturas que desconocían el concepto moderno de igualdad jurídica","Porque la posición social es un criterio subjetivo que cada comunidad define de forma diferente"],why:"Si la dignidad depende de la posición social, filiación o cargo, entonces las dignidades son distintas y desiguales entre personas. Eso es incompatible con el principio de igualdad, que exige que todos los seres humanos tengan la misma dignidad por el hecho de serlo."},
{topic:"Dignidad Humana",q:"La dignidad como fundamento religioso cristiano une la dignidad al principio de igualdad. ¿Qué añade esto respecto de la concepción posicional?",correct:"Que la dignidad es igual para todos porque todos son igualmente creados y redimidos por Dios; no depende de la posición social ni del cargo, y no se pierde ni deteriora a lo largo de la vida",wrong:["Que la dignidad es un atributo que Dios otorga solo a quienes profesan la fe cristiana","Que la dignidad depende del comportamiento moral del individuo y puede perderse por faltas graves","Que la dignidad religiosa es superior a la laica porque tiene un fundamento trascendente inmutable"],why:"A diferencia de la concepción posicional, el fundamento religioso cristiano une la dignidad al principio de igualdad: todos son creados y redimidos por igual. Además, esta dignidad no se pierde ni deteriora a lo largo de la vida."},
{topic:"Dignidad Humana",q:"La concepción ontológica de la dignidad se basa en la naturaleza humana: razón y voluntad. ¿Por qué esto conduce a la igualdad de dignidad entre todos los seres humanos?",correct:"Porque todos los seres humanos comparten la misma naturaleza (razón y voluntad), independientemente de su posición social, raza o cargo; la igualdad de naturaleza implica igualdad de dignidad",wrong:["Porque la razón y la voluntad son capacidades que todos desarrollan plenamente al mismo ritmo","Porque la naturaleza humana es idéntica en todos sus rasgos, sin diferencias individuales de ningún tipo","Porque la ley natural impone a todos los mismos deberes morales, lo que los hace iguales en dignidad"],why:"La concepción ontológica funda la dignidad en la naturaleza humana (razón y voluntad). Como todos los seres humanos comparten esa misma naturaleza, todos tienen igual dignidad. Esta mirada es el fundamento del Humanismo y del Derecho moderno."},
{topic:"Dignidad Humana",q:"Dworkin sostiene que la dignidad surge del apareamiento de dos principios: autorrespeto y autenticidad. ¿Qué consecuencia tiene esto sobre el fundamento de la dignidad?",correct:"Que la dignidad no es un dato dado por la naturaleza o por Dios, sino un producto del individuo y su actuar: se construye a través del autorrespeto y de vivir auténticamente",wrong:["Que la dignidad es idéntica en todos porque el autorrespeto y la autenticidad son capacidades universales","Que la dignidad no puede ser protegida por el derecho porque es un producto subjetivo de cada individuo","Que el Estado debe garantizar el autorrespeto y la autenticidad de cada ciudadano como condición de la dignidad"],why:"Dworkin concibe la dignidad como producto del individuo y su actuar: surge del autorrespeto y la autenticidad. Esto contrasta con las concepciones que fundan la dignidad en la naturaleza humana o en la creación divina, ya que aquí la dignidad es construida, no simplemente recibida."},
{topic:"Dignidad Humana",q:"La Constitución irlandesa de 1937 fue la primera en consagrar el deber estatal de respetar la dignidad. ¿Qué cambio conceptual significó esto?",correct:"Que la dignidad dejó de ser un ideal filosófico para convertirse en un deber jurídico explícito del Estado: ya no basta con reconocerla filosóficamente, el Estado está obligado a respetarla y protegerla",wrong:["Que la dignidad pasó a ser un derecho subjetivo exigible ante los tribunales en cualquier caso concreto","Que la dignidad quedó reducida a un principio de interpretación constitucional, sin efectos directos en la legislación","Que la dignidad se incorporó al derecho internacional antes que al derecho interno de los Estados"],why:"La Constitución irlandesa marcó el paso de la dignidad desde el ámbito filosófico al jurídico positivo: la dignidad del hombre es intocable y respetarla y protegerla es obligación de todo poder estatal. Esto convirtió la dignidad en un deber jurídico del Estado, no solo en un ideal moral."},
{topic:"Dignidad y Bioética",q:"¿Cuál de los siguientes dilemas bioéticos vinculados al inicio de la vida NO corresponde a los mencionados en los apuntes?",correct:"La regulación jurídica del aborto en sus distintas modalidades y plazos",wrong:["La investigación con embriones humanos y obtención de células madre","La clonación humana con fines reproductivos","La manipulación del genoma humano en células germinales"],why:"Los cuatro dilemas mencionados en los apuntes son: investigación con embriones y células madre, clonación humana con fines reproductivos, manipulación del genoma humano en células germinales, y posibles prácticas eugenésicas. El aborto no aparece en ese listado específico."},
{topic:"Dignidad y Bioética",q:"¿Qué problema específico plantea el ensañamiento terapéutico en relación con la dignidad humana?",correct:"Que tratamientos que no logran mejoría sino que prolongan la agonía atentan contra la dignidad del moribundo; por eso se responde con cuidados paliativos que alivian el sufrimiento",wrong:["Que el ensañamiento terapéutico es una forma de eutanasia activa que debe prohibirse absolutamente","Que prolonga la vida del paciente indefinidamente, generando un gasto económico injustificado","Que el médico que aplica tratamientos agresivos incurre en responsabilidad penal automáticamente"],why:"El ensañamiento terapéutico se produce cuando los tratamientos no logran mejoría y solo prolongan la agonía. Eso vulnera la dignidad del moribundo. La respuesta correcta son los cuidados paliativos, que buscan aliviar el sufrimiento físico y proteger la dignidad en el proceso de morir."},
{topic:"Ética Nicomáquea",q:"Aristóteles usa el método dialéctico (endoxa) al estudiar la justicia. ¿Qué implica partir de las nociones comúnmente aceptadas?",correct:"Que Aristóteles no impone una definición previa, sino que parte de lo que todos entienden por justicia e injusticia para someterlo a análisis crítico, buscando coherencia conceptual desde las intuiciones compartidas",wrong:["Que Aristóteles acepta como verdadero todo lo que la mayoría cree sobre la justicia, sin someterlo a crítica","Que Aristóteles parte de la opinión de los expertos juristas y no de la opinión popular","Que el método dialéctico consiste en debatir con posiciones contrarias hasta llegar a una síntesis superadora"],why:"El método dialéctico o endoxal parte de las nociones comúnmente aceptadas y las somete a análisis crítico. Aristóteles no impone una definición a priori, sino que trabaja desde lo que la gente ya entiende por justicia e injusticia, buscando refinar esas intuiciones."},
{topic:"Ética Nicomáquea",q:"Aristóteles identifica que justicia e injusticia son términos multívocos. ¿Qué riesgo práctico genera esta ambigüedad?",correct:"Que se puede aplicar erróneamente criterios de la justicia distributiva a situaciones de justicia correctiva, o viceversa, generando soluciones injustas por confusión de categorías",wrong:["Que el juez puede condenarse a sí mismo al juzgar un caso en que él sea parte","Que la legislación puede quedar desactualizada si los sentidos del término cambian con el tiempo","Que los ciudadanos pierden confianza en el sistema judicial por no saber qué significa exactamente la justicia"],why:"La ambigüedad del término tiene consecuencias prácticas: si confundimos los sentidos —por ejemplo, aplicar proporcionalidad geométrica donde corresponde aritmética, o viceversa— el resultado será injusto. Por eso Aristóteles distingue cuidadosamente la justicia general de la particular, y dentro de esta última, la distributiva de la correctiva."},
{topic:"Ética Nicomáquea",q:"¿Por qué Aristóteles distingue la justicia particular de la justicia general mediante el concepto de pleonexia?",correct:"Porque la pleonexia es la nota diferencial de la injusticia particular: el injusto particular no solo viola la ley, sino que además toma para sí más de lo que le corresponde, motivado por la ganancia",wrong:["Porque la pleonexia es la virtud opuesta a la justicia general, que consiste en dar siempre más de lo que se debe","Porque la pleonexia define a quienes tienen poder político y abusan de él para enriquecerse","Porque la pleonexia es el único vicio que Aristóteles considera absolutamente irredimible moralmente"],why:"La pleonexia (afán de tomar más de lo debido) es la nota diferencial de la injusticia particular. Aristóteles usa tres indicios para distinguirla: el cobarde comete injusticia pero no toma de más; el adúltero que actúa por ganancia comete injusticia particular; los demás actos viciosos se atribuyen al vicio propio del agente."},
{topic:"Ética Nicomáquea",q:"En la justicia correctiva, Aristóteles distingue transacciones involuntarias clandestinas y forzadas. ¿Qué ejemplos corresponden a cada una?",correct:"Clandestinas: hurto, adulterio, asesinato, falso testimonio. Forzadas: malos tratos, confinamiento, homicidio, difamación",wrong:["Clandestinas: compraventa, préstamo, depósito. Forzadas: daños por negligencia","Clandestinas: disputas civiles entre ciudadanos. Forzadas: delitos sancionados penalmente","Clandestinas: actos de un solo agente. Forzadas: actos de varios agentes concatenados"],why:"Aristóteles clasifica las transacciones involuntarias en: clandestinas (hurto, adulterio, asesinato, falso testimonio) y forzadas (malos tratos, confinamiento, homicidio, difamación). Esta distinción anticipa las categorías modernas del Derecho penal."},
{topic:"Ética Nicomáquea",q:"La moneda (nómisma) es introducida por convención como sustituto de la necesidad. ¿Qué función cumple en la teoría aristotélica de la justicia conmutativa?",correct:"Hace conmensurables todas las cosas, permitiendo el intercambio proporcional entre bienes inconmensurables por naturaleza; su valor es convencional, no natural",wrong:["La moneda garantiza que el intercambio sea siempre favorable para el Estado, que actúa como árbitro monetario","La moneda elimina la necesidad de justicia en el intercambio porque establece precios objetivos y naturales","La moneda introduce la injusticia en el intercambio porque su valor convencional no refleja el valor real de los bienes"],why:"Aristóteles entiende la moneda como una convención introducida para hacer posible el intercambio entre bienes que por naturaleza son inconmensurables. Al hacer conmensurables todas las cosas, permite aplicar la proporcionalidad y realizar la justicia en las transacciones."},
{topic:"Ética Nicomáquea",q:"Aristóteles distingue tres tipos de daño en las relaciones entre personas. ¿Cuál de los tres revela el carácter injusto del agente?",correct:"El acto injusto propiamente dicho (adikeímata): se obra a sabiendas y por elección deliberada, revelando que el agente es injusto como carácter, no solo que cometió un acto dañoso",wrong:["El error (hamartémata): porque obrar en ignorancia revela descuido moral que define el carácter","El hecho infortunado (atykhémata): porque producir daño contra lo previsible prueba falta de prudencia","El acto dañoso en estado de cólera: porque la emoción intensa revela la verdadera naturaleza moral del agente"],why:"Solo el acto injusto (adikeímata) revela el carácter injusto porque se realiza a sabiendas y por elección deliberada. Los errores ocurren en ignorancia y son disculpables; los hechos infortunados son contrarios a lo previsible y también disculpables."},
{topic:"Teoría de la Justicia",q:"La expresión de Ulpiano constante y perpetua voluntad conecta con la idea aristotélica de virtud. ¿Por qué?",correct:"Porque la virtud no es un acto aislado sino un hábito estable de la voluntad: ser justo es tener el hábito permanente de querer dar a cada uno lo suyo, no solo hacerlo ocasionalmente",wrong:["Porque la constancia y perpetuidad implican que la justicia es un principio eterno e inmutable que no puede cambiar","Porque la voluntad es la única facultad humana que puede ser constante, a diferencia de la razón que es variable","Porque la fórmula de Ulpiano fue inspirada directamente por los escritos de Aristóteles que Ulpiano conocía en latín"],why:"La expresión constante y perpetua voluntad remite a la idea de virtud moral: la justicia no es solo el acto justo ocasional, sino el hábito estable de querer el bien del otro. Esto conecta con la concepción aristotélica de la virtud como disposición estable (hexis), no como acto aislado."},
{topic:"Teoría de la Justicia",q:"La característica de alteridad en la justicia implica siempre un otro. ¿Qué consecuencia tiene esto para la pregunta de si es posible cometerse injusticia a uno mismo?",correct:"Aristóteles concluye que no es posible: la justicia implica una relación entre más de una persona, y el acto injusto debe ser voluntario; nadie padece injusticia voluntariamente de sí mismo",wrong:["Aristóteles concluye que sí es posible: la persona puede actuar contra sus propios intereses mediante decisiones irracionales","La alteridad no impide la injusticia contra uno mismo porque la persona tiene distintas facultades que pueden entrar en conflicto","La pregunta carece de sentido práctico porque el derecho nunca sanciona conductas que solo afectan al propio agente"],why:"La característica de alteridad implica siempre un otro. Por eso Aristóteles sostiene que no es posible cometerse injusticia a uno mismo: la justicia implica relación entre más de una persona, el acto injusto es voluntario y anterior al daño, nadie padece injusticia voluntariamente."},
{topic:"Teoría de la Justicia",q:"¿Por qué el justo medio de la justicia distributiva es proporcional geométrico y el de la conmutativa es aritmético?",correct:"En la distributiva lo que importa es el mérito relativo de las personas (A/B = C/D); en la conmutativa lo que importa es igualar el daño causado independientemente del mérito (3=3)",wrong:["Porque la distributiva involucra bienes públicos que se miden geométricamente, y la conmutativa bienes privados que se miden aritméticamente","Porque Aristóteles tomó la geometría para asuntos del Estado y la aritmética para asuntos entre privados, siguiendo la tradición pitagórica","Porque la proporcionalidad geométrica es más justa en abstracto, mientras que la aritmética es más fácil de aplicar en la práctica"],why:"La diferencia radica en qué factor determina la igualdad. En la distributiva lo relevante es el mérito de las personas (proporcionalidad geométrica). En la conmutativa el mérito no importa: el juez debe igualar lo que se tiene con lo que se tenía antes (igualdad aritmética, 3=3)."},
{topic:"Teoría de la Justicia",q:"¿Cuál sería un ejemplo de vicio opuesto a la justicia legal o general?",correct:"La evasión de impuestos o el incumplimiento del servicio militar: el individuo no da al todo social lo que le corresponde para el bien común",wrong:["La discriminación arbitraria contra otra persona: vicio propio de la justicia distributiva","El enriquecimiento sin causa a expensas de otro: vulnera la igualdad aritmética de la justicia conmutativa","La acepción de personas al distribuir cargos: vicio propio de la justicia distributiva"],why:"La justicia legal ordena a los particulares dar al todo social lo necesario para el bien común. Su vicio opuesto es no cumplir con esas obligaciones: no pagar tributos, no cumplir el servicio militar, no respetar la ley. Los otros vicios mencionados son propios de la justicia distributiva o conmutativa."},
{topic:"Teoría Política y el Poder",q:"La fase agonal genera el Derecho Electoral y la fase arquitectónica genera el Derecho Constitucional. ¿Qué relación existe entre ambas fases?",correct:"Son complementarias e interdependientes: sin la fase agonal no hay acceso legítimo al poder; sin la arquitectónica el poder conquistado no produce el orden y el bien común que justifican su existencia",wrong:["Son excluyentes: los regímenes democráticos privilegian la agonal y los autoritarios la arquitectónica","La fase agonal es inferior porque solo busca el poder; la arquitectónica es superior porque busca el bien común","La fase arquitectónica precede necesariamente a la agonal: primero se organiza la sociedad y luego se disputa el poder"],why:"Ambas fases son complementarias: la agonal regula cómo se accede legítimamente al poder, y la arquitectónica regula cómo se ejerce para organizar la sociedad y realizar el bien común. Sin la agonal, el acceso sería ilegítimo; sin la arquitectónica, el poder no cumpliría su función social."},
{topic:"Teoría Política y el Poder",q:"¿En qué se diferencia la Teoría Política de la Doctrina Política como formas de conocimiento político?",correct:"La Teoría Política es descriptiva-explicativa: estudia la política tal como es (el ser). La Doctrina Política es normativa: se ocupa de cómo debe ser la política (el deber ser), proponiendo principios e ideales",wrong:["La Teoría Política estudia solo el pasado y la Doctrina Política el presente y el futuro político","La Teoría Política corresponde al ámbito académico y la Doctrina al ámbito de los partidos políticos","La Teoría Política es más rigurosa porque usa métodos cuantitativos, a diferencia de la Doctrina Política"],why:"La distinción clave es entre ser y deber ser: la Teoría Política describe y explica la realidad política tal como existe, mientras que la Doctrina Política prescribe cómo debe ser la acción política, proponiendo principios, valores e ideales que orienten la acción."},
{topic:"Teoría Política y el Poder",q:"¿Qué distingue a la Filosofía Política de la Ciencia Política?",correct:"La Filosofía Política estudia los fenómenos políticos y el orden político justo en un nivel de mayor abstracción y fundamentos últimos; la Ciencia Política usa métodos empíricos para obtener conclusiones verificables",wrong:["La Filosofía Política es más antigua que la Ciencia Política, siendo la primera en desarrollarse históricamente","La Filosofía Política se ocupa del Estado ideal; la Ciencia Política del Estado real, sin ningún punto de contacto","La Filosofía Política es una subdisciplina de la Ciencia Política, que la supera en rigor metodológico"],why:"La Filosofía Política se distingue por su nivel de abstracción y su foco en los fundamentos últimos del orden político justo, integrando dimensiones descriptivas y normativas. La Ciencia Política usa métodos empíricos de investigación para analizar fenómenos políticos y obtener conclusiones verificables."},
{topic:"El Poder",q:"Weber define el poder como probabilidad, no como certeza. ¿Qué implica esta precisión?",correct:"Que el poder nunca garantiza la obediencia: siempre existe la posibilidad de resistencia. El poder es una relación de probabilidades, no una certeza absoluta de cumplimiento",wrong:["Que el poder político es esencialmente débil y no puede garantizar el orden social en ninguna circunstancia","Que Weber define el poder como algo meramente estadístico, sin componente normativo ni moral","Que la probabilidad indica que el poder solo existe cuando la mayoría obedece, desapareciendo si hay disidencia"],why:"La precisión probabilidad es fundamental: el poder no garantiza la obediencia absoluta. Siempre existe la posibilidad de resistencia. Esto explica por qué el poder puede ejercerse aun contra toda resistencia, sin dejar de ser poder."},
{topic:"El Poder",q:"Los apuntes señalan: Fuerza + Consentimiento = Poder; Mandato + Fuerza = Obediencia. ¿Qué revela esta distinción sobre el poder político legítimo?",correct:"Que el poder político legítimo no se reduce a la capacidad coercitiva: requiere también consentimiento. Sin consentimiento, solo hay obediencia forzada, no poder legítimo propiamente dicho",wrong:["Que el poder político siempre necesita usar la fuerza, aunque sea mínimamente, para ser efectivo","Que el consentimiento es suficiente para constituir el poder político, siendo la fuerza solo un complemento","Que la obediencia es superior al poder porque combina mandato y fuerza, siendo más estable políticamente"],why:"La fórmula revela que el poder político legítimo requiere la combinación de fuerza y consentimiento. La obediencia forzada (mandato + fuerza) produce cumplimiento, pero no poder legítimo. El poder verdadero incorpora el consentimiento de quienes obedecen."},
{topic:"El Poder",q:"¿Por qué un régimen autoritario tiende a sustituir la autoridad por la fuerza bruta?",correct:"Porque la autoridad opera por reconocimiento voluntario de competencia o legitimidad; al carecer de ese reconocimiento, el régimen autoritario debe recurrir a la fuerza como sustituto de la autoridad que no tiene",wrong:["Porque la fuerza bruta es más eficiente que la autoridad para lograr el cumplimiento de las normas en el corto plazo","Porque el régimen autoritario rechaza filosóficamente el concepto de autoridad por considerarlo aristocrático","Porque en regímenes autoritarios la población carece de la educación necesaria para reconocer voluntariamente la autoridad"],why:"La autoridad descansa en el reconocimiento voluntario de la competencia o legitimidad del que manda. Un régimen autoritario no cuenta con ese reconocimiento, por lo que compensa la ausencia de autoridad recurriendo a la fuerza bruta."},
{topic:"Legitimidad del Poder",q:"Los apuntes señalan que un poder puede ser legalmente constituido y, sin embargo, ilegítimo si viola sistemáticamente los valores básicos. ¿Qué ejemplo ilustra mejor esta situación?",correct:"Un régimen que llegó al poder mediante elecciones válidas pero que luego suprimió derechos fundamentales y persiguió a minorías: es legal en su origen pero ilegítimo en su ejercicio",wrong:["Un gobierno que aplicó medidas económicas impopulares dentro del marco legal vigente: la impopularidad lo hace ilegítimo","Un régimen que asumió el poder por golpe de Estado pero fue reconocido internacionalmente: la legalidad posterior subsana la ilegitimidad","Un gobierno que incumplió sus promesas electorales: aunque legalmente constituido, la traición al mandato lo hace ilegítimo"],why:"Los apuntes distinguen legalidad y legitimidad: un poder puede ser legalmente constituido y al mismo tiempo ilegítimo si viola sistemáticamente valores básicos como vida, libertad, propiedad e igualdad. La legalidad formal no garantiza la legitimidad sustancial."},
{topic:"Legitimidad del Poder",q:"Los tres criterios de legitimidad se articulan de manera triangular y recíproca. ¿Qué significa que ninguno de los tres puede existir plenamente sin los otros dos?",correct:"Que la legitimidad requiere simultáneamente: respeto a la dignidad humana (DD.HH.), marco normativo democrático (Constitución y leyes) y fundamento moral último (Derecho Natural); si falla uno, la legitimidad queda incompleta",wrong:["Que el Derecho Natural es el único criterio indispensable y los otros dos son su expresión positiva, siendo derivados","Que los tres criterios son equivalentes e intercambiables: basta con cumplir uno de ellos para que el poder sea legítimo","Que la Constitución y las leyes son el criterio principal, siendo los DD.HH. y el Derecho Natural solo criterios interpretativos"],why:"La articulación triangular implica interdependencia: sin DD.HH. (expresión de la dignidad), la legitimidad es solo formal; sin marco normativo democrático, la legitimidad carece de estructura; sin fundamento moral (Derecho Natural), el sistema positivo puede volverse arbitrario. Los tres son necesarios."},
{topic:"Legitimidad del Poder",q:"La legitimidad de ejercicio responde a la pregunta ¿cómo se ejerce el poder? ¿Qué la determina concretamente?",correct:"El respeto a los valores y principios que justifican la existencia del poder: si el poder, una vez obtenido, viola los DD.HH. o el Estado de Derecho, pierde su legitimidad de ejercicio aunque la de origen sea válida",wrong:["La aprobación periódica de la ciudadanía medida en elecciones; si pierde el apoyo mayoritario, pierde legitimidad de ejercicio","El cumplimiento del programa de gobierno presentado en la campaña electoral","El desempeño económico del gobierno: si la economía mejora, el ejercicio es legítimo; si empeora, es ilegítimo"],why:"La legitimidad de ejercicio se determina por la forma en que el poder es ejercido una vez obtenido. Un poder que viola los valores y principios que justifican su existencia (DD.HH., Estado de Derecho, dignidad) pierde su legitimidad de ejercicio."},
{topic:"Instituciones Políticas",q:"El Estado reúne la triple significación de las instituciones. ¿Cómo se aplica cada significado al Estado?",correct:"Institución-cuerpo: el pueblo organizado; institución-órgano: sus poderes (Ejecutivo, Legislativo, Judicial); institución-norma: la Constitución que organiza el poder y define sus límites",wrong:["Institución-cuerpo: el territorio nacional; institución-órgano: el gobierno de turno; institución-norma: las leyes ordinarias","Institución-cuerpo: los ciudadanos con derecho a voto; institución-órgano: el presidente; institución-norma: los tratados internacionales","Institución-cuerpo: las fuerzas armadas; institución-órgano: el poder judicial; institución-norma: el reglamento ejecutivo"],why:"Los apuntes son explícitos: el Estado es institución-cuerpo (el pueblo organizado), institución-órgano (sus poderes: Ejecutivo, Legislativo, Judicial) e institución-norma (la Constitución, que organiza el poder, establece los derechos y define los límites del Estado)."},
{topic:"Instituciones Políticas",q:"¿Por qué el Presidente de la República es clasificado como institución-órgano y no como institución-cuerpo?",correct:"Porque el Presidente es el titular del Poder Ejecutivo en cuanto función institucional, independiente de quién lo ocupe en cada momento: es el rol, no la persona ni el conjunto de normas que lo regulan",wrong:["Porque el Presidente es elegido por el pueblo, lo que lo convierte en representante del cuerpo ciudadano","Porque el Presidente concentra todos los poderes del Estado en su persona durante su mandato","Porque la Constitución define al Presidente como órgano supremo del Estado expresamente"],why:"El Presidente de la República es institución-órgano porque lo relevante es el rol o función institucional (el titular del Poder Ejecutivo), con independencia de quién lo ocupe en cada momento. La institución persiste aunque cambie la persona."},
{topic:"Instituciones Políticas",q:"Los partidos políticos ilustran ambos elementos de las instituciones. ¿Qué corresponde al elemento estructural y qué al intelectual?",correct:"Estructural: el grupo de miembros, los estatutos y el patrimonio. Intelectual: la doctrina, las declaraciones de principios y los programas del partido",wrong:["Estructural: la doctrina ideológica; intelectual: los militantes y sus actividades electorales","Estructural: el financiamiento público que recibe el partido; intelectual: el liderazgo carismático de sus dirigentes","Estructural: los votos obtenidos en elecciones; intelectual: la representación parlamentaria que ejerce"],why:"Los apuntes usan los partidos políticos expresamente para ilustrar ambos elementos: el estructural (grupo de miembros, estatutos, patrimonio) y el intelectual (doctrina, declaraciones de principios y programas del partido)."},
{topic:"Dignidad y Derechos Humanos",q:"La Controversia de los Indios (s. XVI, Las Casas vs. Sepúlveda) es un hito histórico en la dignidad. ¿Cuál era el núcleo del debate?",correct:"Si los indígenas son seres humanos y por tanto si merecen trato digno: Sepúlveda sostenía que eran inferiores y podían ser sometidos; Las Casas defendía su plena humanidad y dignidad",wrong:["Si la Corona española tenía derecho jurídico a conquistar el territorio americano según el derecho romano","Si los indígenas podían adoptar la fe cristiana o si su naturaleza lo impedía irreversiblemente","Si las encomiendas debían ser hereditarias o si debían revertir al Estado tras una generación"],why:"La Controversia de los Indios debatió si los indígenas son seres humanos y si por tanto merecen trato digno. Es un hito histórico porque planteó por primera vez en términos jurídicos la universalidad de la dignidad humana en el contexto de la expansión colonial."},
{topic:"Dignidad y Derechos Humanos",q:"La Declaración Universal de 1948 funda los DD.HH. en la dignidad intrínseca. ¿Qué diferencia esto del enfoque positivista puro?",correct:"Que la fuente de los DD.HH. no es la voluntad del legislador o el Estado, sino la dignidad inherente a todo ser humano; por eso no pueden ser suprimidos por ninguna ley aunque el derecho positivo no los recoja",wrong:["Que la Declaración de 1948 fue aprobada por unanimidad de todos los Estados, lo que le da fuerza jurídica vinculante superior a cualquier constitución","Que el enfoque positivista puro rechaza totalmente la existencia de derechos, mientras que la Declaración los reconoce plenamente","Que la Declaración creó los DD.HH. por primera vez en la historia, sin ningún antecedente previo en el pensamiento jurídico"],why:"Al fundar los DD.HH. en la dignidad intrínseca, la Declaración establece que estos derechos no dependen de la voluntad del Estado ni del legislador. No son otorgados por el derecho positivo, sino reconocidos; por eso ninguna ley puede suprimirlos legítimamente."},

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

var Q = shuffle(BASE.map(function(b) {
  var opts = shuffle([b.correct].concat(b.wrong));
  return { topic: b.topic, q: b.q, opts: opts, ans: opts.indexOf(b.correct), why: b.why };
}));

var current = 0, score = 0, answered = new Array(Q.length).fill(null);

function render() {
  if (current >= Q.length) { showResult(); return; }
  var q = Q[current];
  var pct = Math.round((current / Q.length) * 100);
  document.getElementById('pbar').style.width = pct + '%';
  var isAns = answered[current] !== null;
  var optsHtml = q.opts.map(function(o, i) {
    var cls = '';
    if (isAns) { if (i === q.ans) cls = 'correct'; else if (i === answered[current] && i !== q.ans) cls = 'wrong'; }
    return '<button class="option ' + cls + '" ' + (isAns ? 'disabled' : '') + ' onclick="choose(' + i + ')">' + String.fromCharCode(65 + i) + ') ' + o + '</button>';
  }).join('');
  var fbClass = isAns ? 'show' : '';
  var fbType = (isAns && answered[current] === q.ans) ? 'ok' : 'ko';
  var fbText = isAns ? ((answered[current] === q.ans ? '✓ Correcto. ' : '✗ Incorrecto. ') + q.why) : '';
  var nextBtn = current < Q.length - 1
    ? '<button class="btn primary" onclick="go(1)">Siguiente →</button>'
    : '<button class="btn primary" onclick="current=Q.length;render()">Ver resultado</button>';
  document.getElementById('content').innerHTML =
    '<div class="question-card">' +
    '<div class="q-meta"><span class="topic-badge">' + q.topic + '</span><span class="counter">Pregunta ' + (current+1) + ' de ' + Q.length + '</span></div>' +
    '<p class="q-text">' + q.q + '</p>' +
    optsHtml +
    '<div class="feedback ' + fbClass + ' ' + fbType + '">' + fbText + '</div>' +
    '</div>' +
    '<div class="nav-row">' +
    '<button class="btn" onclick="go(-1)" ' + (current === 0 ? 'disabled' : '') + '>&#8592; Anterior</button>' +
    '<span class="counter">' + score + ' correctas de ' + answered.filter(function(a){return a!==null;}).length + ' respondidas</span>' +
    nextBtn +
    '</div>';
}

function choose(i) {
  if (answered[current] !== null) return;
  answered[current] = i;
  if (i === Q[current].ans) score++;
  render();
}

function go(dir) { current += dir; render(); }

function showResult() {
  document.getElementById('pbar').style.width = '100%';
  var pct = Math.round((score / Q.length) * 100);
  var msg = pct >= 90 ? '¡Excelente dominio del material!' : pct >= 70 ? 'Buen resultado, sigue repasando.' : pct >= 50 ? 'Vas bien, pero hay temas por reforzar.' : 'Conviene repasar los apuntes con más detalle.';
  var dotsHtml = answered.map(function(a, i) {
    var color = a === Q[i].ans ? '#639922' : '#A32D2D';
    return '<div class="dot" title="P.' + (i+1) + ': ' + (a===Q[i].ans?'Correcta':'Incorrecta') + '" style="background:' + color + '"></div>';
  }).join('');
  document.getElementById('content').innerHTML =
    '<div class="question-card score-card">' +
    '<div class="score-num">' + score + '/' + Q.length + '</div>' +
    '<div class="score-label">' + pct + '% &mdash; ' + msg + '</div>' +
    '<div class="dots">' + dotsHtml + '</div>' +
    '<p style="font-size:12px;color:#999;margin-top:10px;">Verde = correcta &nbsp;&middot;&nbsp; Rojo = incorrecta</p>' +
    '</div>' +
    '<div class="nav-row" style="justify-content:center;">' +
    '<button class="btn primary" onclick="location.reload()">Reiniciar con nuevo orden aleatorio</button>' +
    '</div>';
}

render();
</script>
</body>
</html>
